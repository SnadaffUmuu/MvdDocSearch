<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mvd Doc Search Minus</title>
</head>
<style>
  :root {
    --bg: #f3f3f3;
    --text-color: #010102;
    --button: #ccc;
    --text-accent: #0018a3;
    --text-accent-border: #828aff;
    --text-accent-bg: #eadbe2;
    --text-accent-bg-deep: #fff;
    --borderDefault: var(--text-color);
    --borderNeutral: gray;
    --semiBgOverlayed: #f5dae573;
    --thinOverlayed: #ff60a14f;
    --previewNavDotsBg: #e9a6c478;
  }

  body.night {
    --bg: #1e1e1e;
    --bgDeep: #000;
    --text-color: #ad9f98;
    --button: #3c3c3c;
    --text-accent: #b4bd6a;
    --text-accent-border: #7c7c7d;
    --text-accent-bg: #2a2e2a;
    --text-accent-bg-deep: #2d342d;
    --inputBg: #464646;
    --errorBox: #7c7c7d;
    --borderDefault: var(--text-color);
    --semiBgOverlayed: #f3f3f326;
    --thinOverlayed: #f3f3f31a;
    --borderNeutral: gray;
    --previewNavDotsBg: var(--thinOverlayed);
  }

  html,
  body {
    width: 100vw;
    height: 100vh;
    margin: 0;
    padding: 0;
  }

  body {
    display: flex;
    flex-flow: column nowrap;
    background: var(--bg);
    color: var(--text-color);
    font-size: 14px;
    position: relative;
  }

  h4,
  h5 {
    margin: 10px 0;
  }

  main {
    box-sizing: border-box;
    padding: 5px 0;
    width: 100%;
    max-width: 100%;
    min-height: 0;
    overflow: auto;
    position: relative;
    flex: 1 1 auto;
  }

  .dangerousButton {
    border: 1px solid #9e0028;
  }

  #mainInner {
    height: 100%;
    max-height: 100%;
    box-sizing: border-box;
    padding-top: 10px;
  }

  #mainInner>header {
    padding: 10px 15px;
    border-bottom: 1px solid var(--borderNeutral);
    position: fixed;
    top: 49px;
    background: var(--bg);
    width: 100%;
    box-sizing: border-box;
  }

  .excerpt {
    cursor: pointer;
    padding: 10px;
    border-bottom: 1px dashed var(--borderDefault);
  }

  .excerpt.current {
    background: var(--semiBgOverlayed);
  }

  .excerpt mark,
  #fullPreview mark {
    color: var(--text-color);
    background: var(--text-accent-bg);
    padding: 0 1px;
    display: inline-block;
    border-radius: 7px;
  }

  .excerpt.current mark {
    background: var(--text-accent-bg-deep);
  }

  section,
  .section {
    border: 1px solid var(--thinOverlayed);
    border-radius: 10px;
    padding: 5px;
    margin-bottom: 5px;
  }

  button {
    height: 30px;
    padding: 0 10px;
    box-sizing: border-box;
    background: var(--button);
    outline: none;
    border: 0;
    border-radius: 5px;
    color: var(--text-color);
  }

  .button_small {
    height: 20px;
    padding: 0 5px;
  }

  input[type="text"],
  input[type="search"],
  textarea {
    background: var(--inputBg);
    border: 1px solid var(--text-accent-border);
    color: var(--text-color);
    font-size: 16px;
  }

  .hidden {
    display: none !important;
  }

  #queryValidationMessage,
  #error {
    font-size: 12px;
    padding: 5px 0;
    color: #66001a;
  }

  #searchWrap {
    flex: 1 0 auto;
    margin-right: 10px;
  }

  #searchQuery {
    display: block;
    width: 100%;
    height: 100%;
  }

  #searchResCount {
    font-weight: bold;
  }

  #searchResultWrap {
    max-height: 56vh;
    overflow: auto;
    box-sizing: border-box;
    flex: 1 1 auto;
    padding-top: 72px;
  }

  #searchResultsHeader {
    padding: 10px 0;
  }

  .searchResult {
    padding: 5px 15px;
    border-bottom: 1px dashed gray;
    display: flex;
    flex-flow: row nowrap;
    justify-content: space-between;
    overflow: hidden;
    align-items: center;
  }

  .searchResult.current {
    background: var(--semiBgOverlayed);
  }

  .searchResult_details {
    padding-right: 5px;
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
  }

  .searchResult_path {
    font-size: 12px;
    white-space: nowrap;
    text-overflow: clip;
    overflow: hidden;
    direction: rtl;
    text-align: left;
  }

  .searchResult_filename {
    white-space: nowrap;
    text-overflow: clip;
    overflow: hidden;
    direction: rtl;
    text-align: left;
  }

  .searchResult_details>span {
    display: block;
  }

  .searchResult_hits {
    flex: 0 0 auto;
  }

  #indexedFoldersList {
    padding: 0;
    margin: 0;
    list-style: none;
  }

  #indexedFoldersList li {
    display: flex;
    flex-flow: row nowrap;
    align-items: center;
  }

  #indexedFoldersList li+li {
    margin-top: 1px;
    border-top: 1px dotted var(--borderNeutral);
  }

  #indexedFoldersList input {
    flex: 0 0 auto;
    margin-right: 5px;
  }

  #indexedFoldersList li>span {
    overflow-wrap: break-word;
    flex: 1 1 auto;
    font-size: 13px;
  }

  #lastTaskLog {
    padding: 5px;
    white-space: pre-wrap;
    max-height: 70vh;
    overflow: auto;
    flex: 1 0 auto;
  }

  #fileName {
    margin: 0;
    padding: 0;
  }

  #previews {
    max-width: 100vw;
    overflow: auto;
    height: 65vh;
    width: 100%;
    box-sizing: border-box;
    font-size: 17px;
  }

  #previewColsWrap {
    display: flex;
    flex-flow: row nowrap;
    max-height: 100%;
    height: 100%;
  }

  .previewColumn {
    width: 100%;
    max-height: 100%;
    overflow: auto;
    flex: 1 0 auto;
    height: 100%;
    box-sizing: border-box;
    position: relative;
  }

  .previewNav {
    position: sticky;
    height: 40px;
    width: 100%;
    box-sizing: border-box;
    border: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background-image: radial-gradient(var(--thinOverlayed) 1px, transparent 0px);
    background-repeat: repeat;
    background-size: 4px 4px;
    background-position: center;
    background-color: transparent;
    border-radius: 0;
  }

  .night .previewNav {
    background-image: radial-gradient(var(--thinOverlayed) 1px, transparent 0px);
    background-size: 3px 3px;
  }

  #prevChunk {
    top: 0;
  }

  #nextChunk {
    bottom: 0;
  }

  #fullPreview {
    padding: 5px 15px;
    font-family: sans-serif;
    white-space: pre-wrap;
  }

  #error {
    position: fixed;
    bottom: 5px;
    left: 10px;
    right: 10px;
    text-align: center;
    padding: 10px;
    background: var(--errorBox);
  }

  #menu {
    padding: 10px 15px;
    background: var(--bgDeep);
  }

  #manageIndex,
  #prefs {
    padding: 10px;
    height: 100%;
    max-height: 100%;
    overflow: hidden;
    box-sizing: border-box;
  }

  .modal {
    z-index: 500;
    position: fixed !important;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    border: 10px solid var(--semiBgOverlayed);
    background: var(--bg);
  }

  .hasModal {
    overflow: hidden;
  }

  .hasModal:after {
    position: fixed;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 400;
    background: var(--semiBgOverlayed);
  }

  .modal_mini {
    top: 20vh;
    bottom: 20vh;
    left: 20px;
    right: 20px;
  }

  #indexedFoldersListContainer {
    overflow: auto;
    flex: 1 0 auto;
  }

  #indexResultContainer {
    flex: 1 1 auto;
    min-height: 0;
    overflow: auto;
    padding-right: 15px;
  }

  #theBar {
    height: 20px;
    flex: 0 0 auto;
    background-image: radial-gradient(#2a51b7 1px, transparent 0px);
    background-repeat: repeat;
    background-size: 8px 8px;
    background-position: center;
    background-color: transparent;
    border-top: 10px solid var(--bg);
    border-bottom: 10px solid var(--bg);
  }

  .minimalRow,
  .minimalCol {
    flex: 0 0 auto;
  }

  .colFlexContainer {
    display: flex;
    flex-flow: row nowrap;
    align-items: stretch;
  }

  .rowFlexContainer {
    display: flex;
    flex-flow: column nowrap;
    align-items: stretch;
  }

  .justified {
    justify-content: space-between;
  }

  .centered {
    align-items: center !important;
  }

  .closeModalButton {
    width: 30px;
    border-radius: 10px;
    text-align: center;
    line-height: 29px;
  }

  .closeModal {
    bottom: 10px;
    right: 10px;
    position: absolute;
  }

  .spinner,
  #spinnerGlobal {
    position: fixed;
    z-index: 1000;
    top: 0;
    left: 0;
    bottom: 0;
    right: 0;
    background: var(--semiBgOverlayed);
    display: flex;
    flex-flow: column nowrap;
    justify-content: center;
    align-items: center;
  }

  .spinner:not(.noSpinner):before,
  #spinnerGlobal:not(.noSpinner):before {
    content: " ";
    display: block;
    width: 50px;
    height: 50px;
    margin: 8px;
    border-radius: 50%;
    border: 6.4px solid var(--text-color);
    border-color: var(--text-color) transparent var(--text-color) transparent;
    animation: review-ring 1.2s linear infinite;
  }

  @keyframes review-ring {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  #progressBarWrap {
    height: 52px;
    overflow: hidden;
  }

  #progressContainer,
  #searchLogWrap {
    width: calc(100% - 40px);
    margin: 10px auto;
    background: var(--bg);
    border-radius: 5px;
    padding: 10px 10px 25px;
    border: 1px solid var(--borderNeutral);
    box-sizing: border-box;
    position: relative;

  }

  #closeProgress,
  #closeSearchLog {
    position: absolute;
    bottom: 15px;
    right: 15px;
  }

  #fileName {
    text-overflow: clip;
    overflow: hidden;
    direction: rtl;
    text-align: left;
    white-space: nowrap;
  }

  #statusMessage {
    height: 80px;
    overflow: auto;
    margin-bottom: 5px;
    border-bottom: 1px dotted var(--text-color);
    padding: 5px;
  }

  #statusMessage.expanded {
    height: 50vh;
    border-bottom: none;
  }

  #statusMessage>div,
  #lastTaskLog>div,
  #searchLog>div {
    padding: 3px 0;
    display: flex;
    flex-flow: row nowrap;
    justify-content: space-between;
    border-bottom: 1px dotted var(--borderNeutral);
  }

  #statusMessage>div>strong,
  #lastTaskLog>div>strong,
  #searchLog>div>strong {
    flex: 0 0 auto;
    padding-left:5px;
  }

  #searchLog {
    height: 100%;
    overflow: auto;
  }

  #prefs {
    padding: 10px;
  }

  .suggestions {
    position: absolute;
    overflow-y: auto;
    background: var(--bg);
    list-style: none;
    padding: 0;
    margin: 0;
    width: 100%;
    z-index: 1000;
  }

  .suggestions li {
    padding: 7px 10px;
    border-bottom: 1px dotted var(--borderNeutral);
  }

  .suggestions li:hover {
    background-color: #f0f0f0;
  }
</style>

<body class="rowFlexContainer">
  <header id="menu" class="colFlexContainer minimalRow justified">
    <button onclick="toggleModalView('#manageIndex')">index</button>
    <button onclick="toggleModalView('#prefs')">prefs</button>
    <button onClick="toggleNightMode()">theme</button>
  </header>
  <div id="spinnerGlobal" class="hidden">
    <div id="progressContainer" class="hidden">
      <div id="statusMessage"></div>
      <div id="progressBarWrap">
        <div id="fileName" class="hidden" data-initial-text="Файл: -">Файл: -</div>
        <div id="elapsed" class="hidden" data-initial-text="Time: -s">Time: -s</div>
        <progress class="hidden" id="progressBar" value="0" max="100"></progress>
      </div>
      <button id="closeProgress" class="hidden" onclick="toggleSpinner(false)">X</button>
    </div>
  </div>
  <div id="manageIndex" class="rowFlexContainer modal hidden">
    <div class="minimalRow">
      <input type="hidden" id="currentIndexPath" value="">
      <section class="colFlexContainer justified">
        <button onclick="Android.selectFolder()">Выбрать папку</button>
        <button id="deleteIndexesForFolders" class="hidden dangerousButton"
          onClick="deleteIndexForSelectedFolders()">Delete selected</button>
      </section>
      <section id="taskResult" class="minimalRow hidden"></section>
    </div>
    <section id="indexResultContainer" class="rowFlexContainer">
      <section id="indexedFoldersListContainer">
        <ul id="indexedFoldersList" class="hidden"></ul>
      </section>
      <section id="lastTaskLog" class="hidden"></section>
    </section>
    <section class="minimalRow colFlexContainer justified">
      <button onclick="updateIndex()">Update</button>
      <button onclick="rebuildIndex()">Rebuild</button>
      <button onclick="clearDB()" class="dangerousButton">Clear</button>
      <button onclick="Android.exportDB()">Export</button>
      <button class="js-closeModal closeModalButton">X</button>
    </section>
  </div>
  <div id="prefs" class="modal hidden">
    <section>
      <button onclick="Android.requestCurrentExtensions()">Задать расширения</button>
    </section>
    <button class="js-closeModal closeModal">X</button>
  </div>
  <main>
    <div id="mainInner">
      <header class="minimalRow">
        <div class="colFlexContainer justified">
          <div id="searchWrap">
            <input type="search" autocomplete="off" id="searchQuery" oninput="validateQuery(this)"
              list="searchSuggestions">
            <div id="queryValidationMessage" class="hidden">Поиск не поддерживает пробелы, знаки препинания и эмодзи
            </div>
          </div>
          <button id="searchButton" class="minimalCol" onclick="doSearch()">Search</button>
        </div>
        <input type="hidden" id="currentSearchQuery">
        <div id="searchResultsHeader" class="colFlexContainer justified">
          <span>
            Query: <strong id="searchResQuery"></strong>. Results: <span id="searchResCount"></span>
          </span>
          <button id="showSearchLog" class="button_small hidden" onclick="showLog()">?</button>
        </div>
      </header>
      <div id="searchLogWrap" class="hidden modal">
        <div id="searchLog"></div>
        <button class="js-closeModal closeModal">X</button>
      </div>
      <div id="searchResultWrap">
        <div id="searchResult"></div>
      </div>
      <div id="theBar"></div>
      <div id="previews">
        <div id="previewColsWrap">
          <div class="previewColumn" id="excerptsOuter">
            <div id="excerpts"></div>
          </div>
          <div class="previewColumn" id="fullPreviewOuter">
            <button class="previewNav" id="prevChunk" onClick="shiftPreview(false)"></button>
            <div id="fullPreview"></div>
            <button class="previewNav" id="nextChunk" onClick="shiftPreview(true)"></button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="error" class="hidden"></div>
  <ul id="suggestionList" class="suggestions hidden"></ul>
  <script>
    const shortLimit = 50;
    const fullLimit = 500;
    const stringLimit = 80; //kb
    const prefix = "/storage/emulated/0";

    const manageIndex = document.getElementById('manageIndex');
    const currentIndexPath = document.getElementById('currentIndexPath');
    const indexResultContainer = document.getElementById('indexResultContainer');
    const indexedFoldersListEl = document.getElementById('indexedFoldersList');
    const deleteIndexesForFoldersButton = document.getElementById('deleteIndexesForFolders');
    const searchQueryEl = document.getElementById('searchQuery');
    const currentSearchQueryInput = document.getElementById('currentSearchQuery');
    const searchResultEl = document.getElementById('searchResult');
    const previewsEl = document.getElementById('previews');
    const excerptsOuter = document.getElementById('excerptsOuter');
    const excerptsContainer = document.getElementById('excerpts');
    const fullPreviewOuter = document.getElementById('fullPreviewOuter');
    const fullPreviewEl = document.getElementById('fullPreview');
    const progressContainer = document.getElementById('progressContainer');
    const statusMessage = document.getElementById('statusMessage');
    const progressBarEl = document.getElementById('progressBar');
    const progressFileNameEl = document.getElementById('fileName');
    const progressElapsedEl = document.getElementById('elapsed');
    const taskResult = document.getElementById('taskResult');
    const queryValidationMessageEl = document.getElementById('queryValidationMessage');
    const searchButton = document.getElementById('searchButton');
    const errorContainer = document.getElementById('error');
    const mainInner = document.getElementById('mainInner');
    const main = document.querySelector('main');
    const searchResCount = document.getElementById('searchResCount');
    const prefs = document.getElementById('prefs');
    const spinnerGlobal = document.getElementById('spinnerGlobal');
    const closeProgress = document.getElementById('closeProgress');
    const searchResQuery = document.getElementById('searchResQuery');
    const prevChunk = document.getElementById('prevChunk');
    const nextChunk = document.getElementById('nextChunk');
    const lastTaskLog = document.getElementById('lastTaskLog');
    const searchLog = document.getElementById('searchLog');
    const showSearchLog = document.getElementById('showSearchLog');
    const searchLogWrap = document.getElementById('searchLogWrap');
    const allowedExtensions = document.getElementById('allowedExtensions');
    const suggestionList = document.getElementById('suggestionList');

    let currentFileContent = null;
    let highlightedContent = null;
    let currentHit = null;

    function saveSearchQuery(query) {
      const keepCount = 10;
      if(!query || typeof query !== 'string') return;
      let recent = getRecentSearches();
      recent = recent.filter(item => item !== query);
      recent.unshift(query);
      if(recent.length > keepCount) {
        recent = recent.slice(0, keepCount);
      }
      localStorage.setItem('recentSearches', JSON.stringify(recent));
    }

    function getRecentSearches() {
      return JSON.parse(localStorage.getItem('recentSearches')) || [];
    }

    function filterSuggestions(value) {
      const recent = getRecentSearches();
      return recent.filter(q => q.toLowerCase().includes(value.toLowerCase()));
    }

    function updateSuggestions() {
      const recent = getRecentSearches();
      suggestionList.innerHTML = '';
      recent.forEach(query => {
        const option = document.createElement('option');
        option.value = query;
        suggestionList.appendChild(option);
      });
    }

    function showSuggestions(filtered) {
      suggestionList.innerHTML = '';
      if(filtered.length === 0) {
        suggestionList.classList.add('hidden');
        return;
      }

      const inputRect = searchQuery.getBoundingClientRect();
      const spaceBelow = window.innerHeight - inputRect.bottom;
      suggestionList.style.maxHeight = `${(spaceBelow - 10)}px`;

      filtered.forEach(query => {
        const li = document.createElement('li');
        li.textContent = query;
        li.onclick = () => {
          searchQuery.value = query;
          suggestionList.classList.add('hidden');
        };
        suggestionList.appendChild(li);
      });
      positionSuggestionList();
      suggestionList.classList.remove('hidden');
    }

    function positionSuggestionList() {
      const rect = searchQuery.getBoundingClientRect();
      suggestionList.style.position = 'absolute';
      suggestionList.style.top = `${rect.bottom + window.scrollY}px`;
      suggestionList.style.left = `${rect.left + window.scrollX}px`;
      suggestionList.style.width = `${rect.width}px`;
      const maxHeight = window.innerHeight - rect.bottom - 10;
      suggestionList.style.maxHeight = `${maxHeight}px`;
    }

    document.addEventListener('click', (e) => {
      if(!searchQuery.contains(e.target) && !suggestionList.contains(e.target)) {
        suggestionList.classList.add('hidden');
      }
    });

    searchQuery.addEventListener('compositionstart', () => {
      isComposing = true;
    });

    let isComposing = false;
    let composingText = '';

    searchQuery.addEventListener('compositionupdate', (e) => {
      composingText = e.data;
      showSuggestions(filterSuggestions(composingText));
    });

    searchQuery.addEventListener('compositionend', () => {
      isComposing = false;
      composingText = '';
      showSuggestions(filterSuggestions(searchQuery.value));
    });

    searchQuery.addEventListener('focus', () => {
      showSuggestions(filterSuggestions(searchQuery.value));
    });

    searchQuery.addEventListener('input', () => {
      if(!isComposing) {
        showSuggestions(filterSuggestions(searchQuery.value));
      }
    });

    function doSearch() {
      if(!searchQueryEl.value.trim()) return;
      if(containsDisallowedCharacters(searchQueryEl.value.trim())) {
        toggleQueryValidationMessage(true);
        currentSearchQueryInput.value = '';
        return;
      }
      excerptsContainer.innerHTML = '';
      fullPreviewEl.innerHTML = '';
      searchResultEl.innerHTML = '';
      searchResult.innerHTML = '';
      searchResCount.innerHTML = '';
      showSearchLog.classList.add('hidden');
      searchLog.innerHTML = '';
      currentHit = null;
      const timer = createLogTimer('WebClient', false);
      timer.log('front: doSearch started');
      previewsEl.scroll({
        left: 0,
        behavior: 'smooth'
      })
      currentSearchQueryInput.value = searchQueryEl.value.trim();

      saveSearchQuery(currentSearchQueryInput.value);

      toggleSpinner(true);

      setTimeout(() => {
        timer.log('front: calling Android.doSearch');

        const data = Android.doSearch(searchQueryEl.value.trim());

        const res = JSON.parse(data);
        if(res.error) {
          searchResultEl.innerHTML = res.error + '<br>' + res.errorDetails;;
        } else {
          const parsed = res.data;
          searchResCount.textContent = parsed.length;
          searchResQuery.textContent = currentSearchQueryInput.value;
          searchResultEl.innerHTML = parsed.map(o => {
            const actualPath = o.path.startsWith(prefix) ? o.path.slice(prefix.length) : o.path;
            const parts = actualPath.split('/');
            const filename = parts.pop();
            const path = parts.join('/') + '/';
            return `
          <div class="searchResult" data-file-id="${o.fileId}" data-file-path="${o.path}">
            <span class="searchResult_details">
              <span class="searchResult_filename">${filename}</span>
              <span class="searchResult_path">${path}</span>
            </span>
            <span class="searchResult_hits">${o.hits}</span>
          </div>
        `
          }).join('');
          toggleSpinner(false);
          main.scroll({
            top: 0,
            behavior: 'smooth'
          });
          timer.log('front: results to DOM finished');
        }
        timer.logTotal('front: doSearch finished');
      }, 0);
    }

    function onFolderChosen(path) {
      if(confirm("Проиндексировать папку " + path.replace(prefix, '') + "?")) {
        currentIndexPath.value = path;
        toggleSpinner(true);
        setTimeout(() => {
          Android.indexFolder(currentIndexPath.value);
        }, 0);
      }
    }

    function showExcerpts(path) {
      console.log('front: loading file content', path);
      const query = currentSearchQueryInput.value;
      const response = JSON.parse(Android.getFileContent(path));
      if(response.success) {
        currentFileContent = response.data;
        excerptsContainer.innerHTML = '';
        fullPreviewEl.innerHTML = '';
        excerptsContainer.style.display = 'none';
        fullPreviewEl.style.display = 'none';
        previewsEl.scroll({
          left: 0,
          behavior: 'smooth'
        })

        const excerpts = [];
        const indexes = findAllOccurrencesWithPositions(currentFileContent, query);
        indexes.forEach((index, i) => {
          const textBefore = currentFileContent.substring(Math.max(0, index - shortLimit), index);
          const textAfter = currentFileContent.substring(index + query.length, index + query.length + shortLimit);
          const trueQuery = currentFileContent.substring(index, index + query.length);
          excerpts.push(`<div class="excerpt" data-index="${index}">${textBefore}<mark>${trueQuery}</mark>${textAfter}</div>`);
        });
        excerptsContainer.innerHTML = excerpts.join('');
        excerptsContainer.style.display = '';
        //scrollToBottom(main);
        //scrollCurrentHitIntoView();
        displayFullFragment(indexes[0], indexes);
        prevChunk.classList.add('hidden');
      } else {
        console.error('front: getFileContent error:', response.error);
        console.debug('details :', response.errorDetails);
        showError(response.error);
      }
    }

    function displayFullFragment(index, indexes) {
      const query = currentSearchQueryInput.value;
      const currentExcerpt = excerptsContainer.querySelector('.current');
      let prevExcerpt = null;
      let nextExcerpt = null;
      if(currentExcerpt) {
        prevExcerpt = currentExcerpt.previousElementSibling ? currentExcerpt.previousElementSibling : null;
        nextExcerpt = currentExcerpt.nextElementSibling ? currentExcerpt.nextElementSibling : null;
      } else {
        const firstExcerpt = excerptsContainer.querySelector('.excerpt');
        if(firstExcerpt) {
          nextExcerpt = firstExcerpt.nextElementSibling;
        }
      }
      prevChunk.classList.toggle('hidden', !prevExcerpt);
      nextChunk.classList.toggle('hidden', !nextExcerpt);

      const textBefore = highlightOccurrences(currentFileContent.substring(Math.max(0, index - fullLimit), index), query);
      const textAfter = highlightOccurrences(currentFileContent.substring(index + query.length, Math.min(index + query.length + fullLimit, currentFileContent.length)), query);
      const trueQuery = currentFileContent.substring(index, index + query.length);
      fullPreviewEl.innerHTML = `${textBefore}<mark data-index="${index}">${trueQuery}</mark>${textAfter}`;

      const currentMatch = fullPreviewEl.querySelector('[data-index="' + index + '"]');
      fullPreviewEl.style.display = '';
      const targetScrollTop = getInnerElScrollTopToCenterOfOuter(fullPreviewOuter, currentMatch);
      fullPreviewOuter.scrollTop = targetScrollTop;
    }

    function looksLikeJSON(str) {
      str = str.trim();
      return (str.startsWith('{') && str.endsWith('}')) ||
        (str.startsWith('[') && str.endsWith(']'));
    }

    document.addEventListener('click', (e) => {
      const searchResEl = e.target.classList.contains('searchResult') ? e.target : e.target.closest('.searchResult');
      if(searchResEl) {
        if(currentHit != null) {
          const el = document.querySelector(`[data-file-id='${currentHit}']`);
          if(el) {
            el.classList.remove('current');
          }
        }
        searchResEl.classList.add('current');
        currentHit = searchResEl.dataset.fileId;
        showExcerpts(searchResEl.dataset.filePath);
      }
    });

    document.addEventListener('click', (e) => {
      const excerptEl = e.target.classList.contains('excerpt') ? e.target : e.target.closest('.excerpt');
      if(excerptEl) {
        document.querySelector('.excerpt.current')?.classList.remove('current');
        excerptEl.classList.add('current');
        displayFullFragment(parseInt(excerptEl.dataset.index));
        previewsEl.scrollTo({
          left: fullPreviewOuter.offsetLeft,
          behavior: 'smooth'
        });
      }
    });

    function findTagsWithContext(text, contextLength, tagName) {
      /*
      {
        tag: '<div>DIV</div>',
        before: 'Теги: ',
        after: ' и <',
        start: 6,
        end: 18
      }      
      */
      const regex = new RegExp(
        `<${tagName}(?:\\s[^>]*)?>.*?<\\/${tagName}>`,
        'g'
      );
      const results = [];
      let match;

      while((match = regex.exec(text)) !== null) {
        const start = match.index;
        const end = start + match[0].length;

        results.push({
          tag: match[0],
          before: text.slice(Math.max(0, start - contextLength), start),
          after: text.slice(end, end + contextLength),
          start,
          end
        });

        if(match.index === regex.lastIndex) regex.lastIndex++;
      }

      return results;
    }

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function findAllOccurrencesWithPositions(text, searchString) {
      const regex = new RegExp(escapeRegExp(searchString), 'gi');
      let match;
      const results = [];

      while((match = regex.exec(text)) !== null) {
        results.push(match.index);
        if(match.index === regex.lastIndex) {
          regex.lastIndex++;
        }
      }

      return results;
    }

    function highlightOccurrences(text, searchString) {
      if(!searchString) return text;
      const regex = new RegExp(escapeRegExp(searchString), 'g');
      let matchCount = 0;
      return text.replace(regex, (match) => {
        return `<mark>${match}</mark>`;
      });
    }

    function updateProgressUiEl(el, data) {
      const prefix = el.dataset?.initialText || '';
      if(data) {
        el.textContent = prefix.replace('-', data);
        el.classList.remove('hidden');
      }
    }

    function renderProgress(data, isFinished) {
      spinnerGlobal.classList.add('noSpinner');
      updateProgressUiEl(progressFileNameEl, data.fileName);
      updateProgressUiEl(progressElapsedEl, data.elapsed);
      if(data.percent) {
        progressBarEl.value = data.percent;
        progressBarEl.classList.remove('hidden');
      }
      if(data.stage || data.stageElapsed !== undefined) {
        let output = '';
        if(data.stage) {
          output = `<span>${data.stage}</span>`;
        }
        if(data.stageElapsed) {
          output += `<strong>${data.stageElapsed}</strong>`;
        }
        if(output) {
          statusMessage.insertAdjacentHTML('beforeend', `<div>${output}</div>`);
          statusMessage.scrollTop = statusMessage.scrollHeight;
        }
      }
      progressContainer.classList.remove('hidden');
      if(isFinished) {
        statusMessage.classList.add('expanded');
      }
    }

    function onIndexDone(data) {
      resetProgressBar();
      reRenderIndexView(data);
    }

    function renderIndexedFolders(data) {
      let output = '';
      if(data.error) {
        output = data.error + "<br>" + data.errorDetails
      } else {
        allFoldersRes = data.data.map(o => {
          return `
          <li>
            <input type="checkbox" name="indexedFolder" value="${o.path}">
            <span>${o.path.replace(prefix, '')}</span>
          </li>
        `
        }).join('');
      }
      indexedFoldersListEl.innerHTML = allFoldersRes;
      indexedFoldersListEl.classList.toggle('hidden', !allFoldersRes.length);
      deleteIndexesForFoldersButton.classList.toggle('hidden', !allFoldersRes.length);
    }

    renderIndexedFolders(JSON.parse(Android.getIndexedFolders()));

    function deleteIndexForSelectedFolders() {
      if(confirm("Точно удалить индекс по папкам?")) {
        toggleSpinner(true);
        setTimeout(() => {
          const selectedPaths = [...indexedFoldersListEl.querySelectorAll('[type="checkbox"]:checked')].map(el => el.value);
          Android.deleteIndexesForPaths(JSON.stringify(selectedPaths))
        }, 0);
      }
    }

    function clearDB() {
      if(confirm("Точно удалить ВСЁ?")) {
        toggleSpinner(true);
        setTimeout(() => {
          Android.clearDB();
        }, 0);
      }
    }

    function reRenderIndexView(data) {
      closeProgress.classList.remove('hidden');
      renderIndexedFolders(data);
    }

    function updateIndex() {
      if(confirm("Точно обновить индекс? Индексируются только измененные и новые файлы")) {
        toggleSpinner(true);
        setTimeout(() => {
          const selectedPaths = [...indexedFoldersListEl.querySelectorAll('[type="checkbox"]:checked')].map(el => el.value);
          Android.updateIndex(JSON.stringify(selectedPaths));
        }, 0);
      }
    }

    function rebuildIndex() {
      if(confirm("Точно перестроить заново весь индекс?")) {
        toggleSpinner(true);
        setTimeout(() => {
          const selectedPaths = [...indexedFoldersListEl.querySelectorAll('[type="checkbox"]:checked')].map(el => el.value);
          Android.rebuildIndex(JSON.stringify(selectedPaths))
        }, 0);
      }
    }

    function shiftPreview(goDown) {
      console.log('front: shiftPreview', goDown);
      const current = excerptsContainer.querySelector('.current');
      console.log('front: current excerpt', current);
      let next = null;
      if(goDown) {
        next = current ? current.nextElementSibling ? current.nextElementSibling : null : excerptsContainer.querySelector('.excerpt').nextElementSibling;
      } else {
        next = current ? current.previousElementSibling ? current.previousElementSibling : null : null;
      }
      console.log('front: next excerpt', next);
      if(next) {
        next.click();
        excerptsOuter.scrollTop = getInnerElScrollTopToCenterOfOuter(excerptsOuter, next);
      }
    }

    function getStringSizeInKB(str) {
      return (new Blob([str]).size) / 1024;
    }

    function getInnerElScrollTopToCenterOfOuter(outer, inner) {
      const innerRect = inner.getBoundingClientRect();
      const outerRect = outer.getBoundingClientRect();
      const relativeTop = innerRect.top - outerRect.top + outer.scrollTop;
      const targetScroll = relativeTop - (outer.clientHeight / 2) + (inner.clientHeight / 2);
      return Math.min(targetScroll, outer.scrollHeight - outer.clientHeight)
    }

    function toggleQueryValidationMessage(show) {
      queryValidationMessageEl.classList.toggle('hidden', !show);
    }

    function containsDisallowedCharacters(str) {
      const punctuationOrSymbol = /[\p{P}\p{So}〆〤\u3000\u3001\u3002\u300C\u300D\u300E\u300F]/u;
      const emoji = /[\uD83C-\uDBFF][\uDC00-\uDFFF]/;
      const whitespace = /\s/;
      return punctuationOrSymbol.test(str) || emoji.test(str) || whitespace.test(str);
    }

    function validateQuery(input) {
      toggleQueryValidationMessage(containsDisallowedCharacters(input.value.trim()));
      searchButton.toggleAttribute('disabled', containsDisallowedCharacters(input.value.trim()))
    }

    function handleSearchFromAndroid(query) {
      console.log('front: received search query from Android');
      searchQueryEl.value = query;
      searchQueryEl.dispatchEvent(new Event('input'));
      searchQueryEl.blur();
      searchButton.click();
    }

    function showError(error) {
      errorContainer.textContent = error;
      errorContainer.classList.remove('hidden');
      setTimeout(() => {
        errorContainer.textContent = '';
        errorContainer.classList.add('hidden');
      }, 5000)
    }

    function toggleModalView(reference) {
      let el = null;
      if(typeof reference === 'string') {
        el = document.querySelector(reference);
      } else if(reference instanceof HTMLElement) {
        el = reference;
      }
      el.classList.toggle('hidden');
      document.body.style.overflow = el.classList.contains('hidden') ? '' : 'hidden';
      document.body.classList.toggle('hasModal', !el.classList.contains('hidden'));
    }

    document.body.addEventListener('click', (e) => {
      if(e.target.classList.contains('js-closeModal')) {
        toggleModalView(e.target.closest('.modal'));
      }
    })

    function createLogTimer(tag, resetOnLog) {
      let startTime = performance.now();
      let lastTime = startTime;

      function format(ms) {
        return ms < 1000 ? `${ms.toFixed(0)} ms` : `${(ms / 1000).toFixed(2)} s`;
      }

      return {
        log: function (message) {
          const now = performance.now();
          const elapsed = now - lastTime;
          if(resetOnLog) lastTime = now;
          console.log(`[${tag}] ${message} (+${format(elapsed)})`);
        },
        logTotal: function (message) {
          const now = performance.now();
          const totalElapsed = now - startTime;
          console.log(`[${tag}] ${message} (TOTAL: ${format(totalElapsed)})`);
        },
        reset: function () {
          startTime = performance.now();
          lastTime = startTime;
        }
      };
    }

    function toggleNightMode() {
      const isNight = document.body.classList.toggle('night');
      console.log('front: isNight? ' + isNight);
      localStorage.setItem("nightMode", isNight ? "on" : "off");
    }

    const isNight = localStorage.getItem("nightMode") && localStorage.getItem("nightMode") === 'on';
    console.log('front: got nightMode from localStorage: ' + isNight)
    if(isNight) {
      document.body.classList.add("night");
    }

    function resetProgressBar() {
      progressBarEl.value = 0;
      progressBarEl.classList.add('hidden');
      progressFileNameEl.textContent = prefix;
      progressFileNameEl.classList.add('hidden');
      progressElapsedEl.textContent = prefix;
      progressElapsedEl.classList.add('hidden');
    }

    function toggleSpinner(on) {
      if(!manageIndex.classList.contains('hidden') && !on) {
        //if it's index managing spinner
        resetProgressUi();
      }
      spinnerGlobal.classList.toggle('hidden', !on);
    }

    function resetProgressUi() {
      lastTaskLog.innerHTML = statusMessage.innerHTML;
      lastTaskLog.classList.remove('hidden');
      updateProgressUiEl(progressFileNameEl, null);
      updateProgressUiEl(progressElapsedEl, null);
      closeProgress.classList.add('hidden');
      resetProgressBar();
      statusMessage.innerHTML = '';
      progressContainer.classList.add('hidden');
      console.log('progress bar was hidden');
      statusMessage.classList.remove('expanded');
      spinnerGlobal.classList.remove('noSpinner');
    }

    function onSearchProgress(data) {
      if(data.stage || data.stageElapsed !== undefined) {
        let output = '';
        if(data.stage) {
          output = `<span>${data.stage}</span>`;
        }
        if(data.stageElapsed) {
          output += `<strong>${data.stageElapsed}</strong>`;
        }
        if(output) {
          searchLog.insertAdjacentHTML('beforeend', `<div>${output}</div>`);
          searchLog.scrollTop = statusMessage.scrollHeight;
          showSearchLog.classList.remove('hidden');
        }
      }
    }

    function showLog() {
      toggleModalView(searchLogWrap);
    }

    window._onNativeMessage = (res) => {
      const data = JSON.parse(res);
      //console.log('front:nativeMessage: ' + res);
      switch(data.type) {
        case 'search':
          onSearchProgress(data.data);
          break;
        case "indexFolder":
        case 'updateIndex':
          onIndexDone(data);
          break;
        case "indexProgress":
        case "statusUpdate":
        case "statusFinish":
          renderProgress(data.data, data.type === 'statusFinish')
          break;
        case "rebuildIndex":
        case "deleteIndexesForPaths":
        case 'clearDB':
          reRenderIndexView(data)
          break;
      }
    }

        function scrollToBottom(el, isSmooth) {
          const options = {
            top: el.scrollHeight - el.clientHeight,
          };
          if(isSmooth) {
            options.behavior = 'smooth';
          }
          el.scrollTo(options);
        }
    
        function scrollCurrentHitIntoView() {
          const current = document.querySelector('.searchResult.current');
          const targetRect = current.getBoundingClientRect();
          const containerRect = main.getBoundingClientRect();
          const scrollTop = targetRect.top - containerRect.top + container.scrollTop;
          container.scrollTo({
            top: scrollTop,
            behavior: 'smooth'
          });
        }
    */
    function showPromptWithDefaults(defaults) {
      var response = prompt("Укажите расширения через запятую:", defaults);
      if(response !== null) {
        Android.saveExtensions(response);
      }
    }

  </script>
