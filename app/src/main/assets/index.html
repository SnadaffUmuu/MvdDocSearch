<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mvd Doc Search Minus</title>
</head>
<style>
  :root {
    --bg: #e9e4e5;
    --bgDeep: #fff;
    --text-color: #010102;
    --button: #b9b9b9;
    --text-accent-border: #828aff;
    --text-accent-bg: #fff;
    --text-accent-bg-deep: var(--bg);
    --inputBg: #fff;
    --borderDefault: var(--text-color);
    --borderNeutral: gray;
    --semiBgOverlayed: #d6cee1a3;
    --currentItemBg: #fff;
    --thinOverlayed: #6c6cbb8c;
    /* --previewNavDotsBg: #e9a6c478; */
    --theBarDots: #2a51b7;
    --dropShadow: #85789b59;
    --errorText: #66001a;
  }

  body.night {
    --bg: #1e1e1e;
    --bgDeep: #000;
    --text-color: #ad9f98;
    --button: #3c3c3c;
    --text-accent-border: #7c7c7d;
    --text-accent-bg: #343a34;
    --text-accent-bg-deep: #2b302b;
    --inputBg: #464646;
    --errorBox: #7c7c7d;
    --borderDefault: var(--text-color);
    --semiBgOverlayed: #f3f3f326;
    --currentItemBg: #f3f3f326;
    --thinOverlayed: #f3f3f31a;
    --borderNeutral: gray;
    /* --previewNavDotsBg: var(--thinOverlayed); */
    --dropShadow: #000000a1;
    --theBarDots: #808ba7;
    --errorText: #fff;
  }

  html,
  body {
    width: 100vw;
    height: 100vh;
    margin: 0;
    padding: 0;
  }

  body {
    display: flex;
    flex-flow: column nowrap;
    background: var(--bg);
    color: var(--text-color);
    font-size: 14px;
    position: relative;
  }

  h4,
  h5 {
    margin: 10px 0;
  }

  main {
    box-sizing: border-box;
    padding: 0 0 5px;
    width: 100%;
    max-width: 100%;
    min-height: 0;
    overflow: auto;
    position: relative;
    flex: 1 1 auto;
  }

  main.preventScroll {
    overflow: hidden;
  }

  .dangerousButton {
    border: 1px solid #9e0028;
  }

  #mainInner {
    height: 100%;
    max-height: 100%;
    box-sizing: border-box;
    /* padding-top: 10px; */
  }

  #mainInner>header {
    padding: 20px 15px 5px;
    border-bottom: 1px solid var(--borderNeutral);
    position: fixed;
    background: var(--bg);
    width: 100%;
    box-sizing: border-box;
  }

  .excerpt {
    cursor: pointer;
    padding: 10px;
    border-bottom: 1px dashed var(--borderDefault);
  }

  .excerpt.current {
    background: var(--currentItemBg);
  }

  .excerpt mark,
  #fullPreview mark {
    color: var(--text-color);
    background: var(--text-accent-bg);
    padding: 0 1px;
    display: inline-block;
    border-radius: 7px;
  }

  .excerpt.current mark {
    background: var(--text-accent-bg-deep);
  }

  section,
  .section {
    border: 1px solid var(--text-accent-border);
    border-radius: 10px;
    padding: 5px;
    margin-bottom: 5px;
  }

  button {
    height: 30px;
    padding: 0 10px;
    box-sizing: border-box;
    background: var(--button);
    outline: none;
    border: 0;
    border-radius: 5px;
    color: var(--text-color);
  }

  .button_small {
    height: 20px;
    padding: 0 5px;
  }

  input[type="text"],
  input[type="search"],
  textarea {
    background: var(--inputBg);
    border: 1px solid var(--text-accent-border);
    color: var(--text-color);
    font-size: 16px;
    border-radius: 3px;
  }

  .hidden {
    display: none !important;
  }

  #queryValidationMessage,
  #error {
    font-size: 12px;
    padding: 5px;
    color: var(--errorText);
    margin-top: 5px;
  }

  #searchHeader {
    box-shadow: 0px 7px 7px var(--dropShadow);
  }

  #searchWrap {
    flex: 1 1 auto;
    margin-right: 10px;
  }

  #searchQuery {
    display: block;
    width: 100%;
    height: 100%;
    outline: none;
  }

  #searchResCount {
    font-weight: bold;
  }

  #searchResultWrap {
    max-height: 56vh;
    overflow: auto;
    box-sizing: border-box;
    /* margin-top: 92px; */
  }

  #searchResultsHeader {
    padding: 15px 0 10px;
  }

  #queryInfo {
    white-space: nowrap;
    padding-right: 5px;
    flex: 1 1 auto;
  }

  #pathFilter {
    flex: 0 1 auto;
    min-width: 0;
    box-sizing: border-box;
  }

  #pathFilter button {
    padding: 0 5px;
    flex: 0 1 auto;
    transition: transform 0.3s ease;
  }

  #pathFilterInput {
    display: none;
    flex: 1 1 auto;
    min-width: 0;
    box-sizing: border-box;
    margin: 0 10px 0 5px;
    background: transparent;
    border: 0;
    border-radius: 0;
    border-bottom: 1px dashed var(--borderNeutral);
    outline: none;
    height: 20px;
  }

  #pathFilter.expanded #pathFilterInput {
    display: unset;
  }

  #pathFilter.expanded button {
    transform: rotate(90deg);
  }

  .searchResult {
    padding: 5px 15px;
    border-bottom: 1px dashed gray;
    display: flex;
    flex-flow: row nowrap;
    justify-content: space-between;
    overflow: hidden;
    align-items: center;
  }

  .searchResult.current {
    background: var(--currentItemBg);
  }

  .searchResult_details {
    padding-right: 5px;
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
  }

  .searchResult_path {
    font-size: 12px;
    white-space: nowrap;
    text-overflow: clip;
    overflow: hidden;
    direction: rtl;
    text-align: left;
  }

  .searchResult_filename {
    white-space: nowrap;
    text-overflow: clip;
    overflow: hidden;
    direction: rtl;
    text-align: left;
  }

  .searchResult_details>span {
    display: block;
  }

  .searchResult_hits {
    flex: 0 0 auto;
  }

  #indexedFoldersList {
    padding: 0;
    margin: 0;
    list-style: none;
  }

  #indexedFoldersList li {
    display: flex;
    flex-flow: row nowrap;
    align-items: center;
  }

  #indexedFoldersList li+li {
    margin-top: 1px;
    border-top: 1px dotted var(--borderNeutral);
  }

  #indexedFoldersList input {
    flex: 0 0 auto;
    margin-right: 5px;
  }

  #indexedFoldersList li>span {
    overflow-wrap: break-word;
    flex: 1 1 auto;
    font-size: 13px;
  }

  #lastTaskLog {
    padding: 5px;
    white-space: pre-wrap;
    max-height: 70vh;
    overflow: auto;
    flex: 1 0 auto;
  }

  #fileName {
    margin: 0;
    padding: 0;
  }

  #previews {
    max-width: 100vw;
    overflow: auto;
    border-bottom-right-radius: 5px;
    height: 65vh;
    width: 100%;
    box-sizing: border-box;
    font-size: 17px;
  }

  #previewColsWrap {
    display: flex;
    flex-flow: row nowrap;
    max-height: 100%;
    height: 100%;
  }

  .previewColumn {
    width: 100%;
    max-height: 100%;
    overflow: auto;
    flex: 1 0 auto;
    height: 100%;
    box-sizing: border-box;
    /* position: relative; */
    /* z-index: -1; */
  }

  .previewNav {
    position: sticky;
    height: 40px;
    width: 100%;
    box-sizing: border-box;
    border: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background-image: radial-gradient(var(--thinOverlayed) 1px, transparent 0px);
    background-repeat: repeat;
    background-size: 4px 4px;
    background-position: center;
    background-color: transparent;
    border-radius: 0;
  }

  .night .previewNav {
    background-image: radial-gradient(var(--thinOverlayed) 1px, transparent 0px);
    background-size: 3px 3px;
  }

  #prevChunk {
    top: 0;
  }

  #nextChunk {
    bottom: 0;
  }

  #fullPreview {
    padding: 5px 15px;
    font-family: sans-serif;
    white-space: pre-wrap;
  }

  #error {
    position: fixed;
    bottom: 5px;
    left: 10px;
    right: 10px;
    text-align: center;
    padding: 10px;
    background: var(--errorBox);
  }

  #menuTrigger {
    width: 45px;
    font-size: 32px;
    margin-left: -15px;
    text-align: center;
    margin-top: -15px;
    box-sizing: border-box;
    height: 45px;
    line-height: 55px;
  }

  #menu {
    background: var(--bg);
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: 500;
    /* border-bottom-right-radius: 5px; */
    justify-content: flex-start;
  }
  
  #menu.active {
    transform: translateX(0);
    box-shadow: 7px 7px 7px var(--dropShadow);
  }

  #menu button {
    width: 70px;
    height: 70px;
    background: none;
  }

  #togglePrefs {
    font-size: 18px;
  }

  #toggleNightMode {
    font-size: 32px;
  }

  #toggleIndexView {
    font-size: 25px;
  }

  #manageIndex,
  #prefs {
    padding: 10px;
    height: 100%;
    max-height: 100%;
    overflow: hidden;
    box-sizing: border-box;
  }

  .modal {
    z-index: 500;
    position: fixed !important;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    border: 10px solid var(--semiBgOverlayed);
    background: var(--bg);
  }

  .hasModal {
    overflow: hidden;
  }

  .hasModal:after {
    position: fixed;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 400;
    background: var(--semiBgOverlayed);
  }

  .modal_mini {
    top: 20vh;
    bottom: 20vh;
    left: 20px;
    right: 20px;
  }

  #indexedFoldersListContainer {
    overflow: auto;
    flex: 1 0 auto;
  }

  #indexResultContainer {
    flex: 1 1 auto;
    min-height: 0;
    overflow: auto;
    padding-right: 15px;
  }

  #theBar {
    height: 20px;
    flex: 0 0 auto;
    background-image: radial-gradient(var(--theBarDots) 1px, transparent 0px);
    background-repeat: repeat;
    background-size: 8px 8px;
    background-position: center;
    background-color: transparent;
    border-top: 10px solid var(--bg);
    border-bottom: 10px solid var(--bg);
    box-shadow: 0px -7px 15px var(--dropShadow), 0px 7px 10px var(--dropShadow);
  }

  .minimalRow,
  .minimalCol {
    flex: 0 1 auto;
  }

  .colFlexContainer {
    display: flex;
    flex-flow: row nowrap;
    align-items: stretch;
  }

  .rowFlexContainer {
    display: flex;
    flex-flow: column nowrap;
    align-items: stretch;
  }

  .justified {
    justify-content: space-between;
  }

  .centered {
    align-items: center !important;
  }

  .wrapped {
    flex-wrap: wrap !important;
  }

  .closeModalButton {
    width: 30px;
    border-radius: 10px;
    text-align: center;
  }

  .closeModal {
    bottom: 10px;
    right: 10px;
    position: absolute;
  }

  .spinner,
  #spinnerGlobal {
    position: fixed;
    z-index: 1000;
    top: 0;
    left: 0;
    bottom: 0;
    right: 0;
    background: var(--semiBgOverlayed);
    display: flex;
    flex-flow: column nowrap;
    justify-content: center;
    align-items: center;
  }

  .spinner:not(.noSpinner):before,
  #spinnerGlobal:not(.noSpinner):before {
    content: " ";
    display: block;
    width: 50px;
    height: 50px;
    margin: 8px;
    border-radius: 50%;
    border: 6.4px solid var(--text-color);
    border-color: var(--text-color) transparent var(--text-color) transparent;
    animation: review-ring 1.2s linear infinite;
  }

  @keyframes review-ring {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  #progressBarWrap {
    height: 60px;
    overflow: hidden;
  }

  #progressContainer,
  #searchLogWrap {
    width: calc(100% - 40px);
    margin: 10px auto;
    background: var(--bg);
    border-radius: 5px;
    padding: 10px 10px 25px;
    border: 1px solid var(--borderNeutral);
    box-sizing: border-box;
    position: relative;

  }

  #closeProgress,
  #closeSearchLog {
    position: absolute;
    bottom: 15px;
    right: 15px;
  }

  #showSearchLog {
    margin-left: 5px;
  }

  #fileName {
    text-overflow: clip;
    overflow: hidden;
    direction: rtl;
    text-align: left;
    white-space: nowrap;
  }

  #statusMessage {
    height: 80px;
    overflow: auto;
    margin-bottom: 5px;
    border-bottom: 1px dotted var(--text-color);
    padding: 5px;
  }

  #statusMessage.expanded {
    height: 50vh;
    border-bottom: none;
  }

  #statusMessage>div,
  #lastTaskLog>div,
  #searchLog>div {
    padding: 3px 0;
    display: flex;
    flex-flow: row nowrap;
    justify-content: space-between;
    border-bottom: 1px dotted var(--borderNeutral);
  }

  #statusMessage>div>strong,
  #lastTaskLog>div>strong,
  #searchLog>div>strong {
    flex: 0 0 auto;
    padding-left: 5px;
  }

  #searchLog {
    height: 100%;
    overflow: auto;
  }

  #prefs {
    padding: 10px;
  }

  .suggestions {
    position: absolute;
    overflow-y: auto;
    background: var(--bg);
    list-style: none;
    padding: 0;
    margin: 0;
    width: 100%;
    z-index: 1000;
    box-sizing: border-box;
    border: 2px solid var(--inputBg);
    border-radius: 0 0 5px 5px;
  }

  .suggestions li {
    padding: 7px 10px;
    border-bottom: 1px dotted var(--borderNeutral);
  }

  .suggestions li:hover {
    background-color: #f0f0f0;
  }
</style>

<body class="rowFlexContainer">
  <div id="menu" class="rowFlexContainer justified">
    <button id="toggleNightMode" onClick="toggleNightMode()">☯</button>
    <button id="toggleIndexView" onclick="toggleModalView('#manageIndex')">ⓘ</button>
    <button id="togglePrefs" onclick="toggleModalView('#prefs')">⚙️</button>
  </div>
  <div id="spinnerGlobal" class="hidden">
    <div id="progressContainer" class="hidden">
      <div id="statusMessage"></div>
      <div id="progressBarWrap">
        <div id="fileName" class="hidden" data-initial-text="Файл: -">Файл: -</div>
        <div id="elapsed" class="hidden" data-initial-text="Time: -">Time: -</div>
        <progress class="hidden" id="progressBar" value="0" max="100"></progress>
      </div>
      <button id="closeProgress" class="hidden" onclick="toggleSpinner(false)">X</button>
    </div>
  </div>
  <div id="manageIndex" class="rowFlexContainer modal hidden">
    <div class="minimalRow">
      <input type="hidden" id="currentIndexPath" value="">
      <section class="colFlexContainer justified">
        <button onclick="Android.selectFolder()">Выбрать папку</button>
        <button id="deleteIndexesForFolders" class="hidden dangerousButton"
          onClick="deleteIndexForSelectedFolders()">Delete selected</button>
      </section>
      <section id="taskResult" class="minimalRow hidden"></section>
    </div>
    <section id="indexResultContainer" class="rowFlexContainer">
      <section id="indexedFoldersListContainer">
        <h5 id="indexedFoldersListTitle" class="hidden"></h5>
        <ul id="indexedFoldersList" class="hidden"></ul>
      </section>
      <section id="lastTaskLog" class="hidden"></section>
    </section>
    <section class="minimalRow colFlexContainer justified wrapped">
      <button onclick="updateIndex()">Update</button>
      <button onclick="rebuildIndex()">Rebuild</button>
      <button onclick="clearDB()" class="dangerousButton">Clear</button>
      <button onclick="Android.exportDB()">Export</button>
      <button class="js-closeModal closeModalButton">X</button>
    </section>
  </div>
  <div id="prefs" class="modal hidden">
    <section>
      <button onclick="Android.requestCurrentExtensions()">Расширения</button>
    </section>
    <section>
      <button onclick="Android.requestCurrentExcludedPaths()">Исключить пути</button>
    </section>
    <button class="js-closeModal closeModal">X</button>
  </div>
  <main>
    <div id="mainInner">
      <header id="searchHeader" class="minimalRow">
        <div class="colFlexContainer justified">
          <div id="menuTrigger" class="minimalCol">⋮</div>
          <div id="searchWrap">
            <input type="search" autocomplete="off" id="searchQuery" oninput="validateQuery(this)">
          </div>
          <button id="searchButton" class="minimalCol" onclick="doSearch()">Search</button>
        </div>
        <input type="hidden" id="currentSearchQuery">
        <div id="queryValidationMessage" class="hidden">Поиск не поддерживает пробелы, знаки препинания и эмодзи</div>
        <div id="searchResultsHeader" class="colFlexContainer justified">
          <span id="queryInfo">
            Query: <strong id="searchResQuery"></strong>. Results: <span id="searchResCount"></span>
          </span>
          <span id="pathFilter" class="colFlexContainer">
            <input type="search" id="pathFilterInput">
            <button class="button_small" onclick="togglePathFilter()">▼</button>
          </span>
          <button id="showSearchLog" class="button_small hidden" onclick="showLog()">?</button>
        </div>
      </header>
      <div id="searchLogWrap" class="hidden modal">
        <div id="searchLog"></div>
        <button class="js-closeModal closeModal">X</button>
      </div>
      <div id="searchResultWrap">
        <div id="searchResult"></div>
      </div>
      <div id="theBar"></div>
      <div id="previews">
        <div id="previewColsWrap">
          <div class="previewColumn" id="excerptsOuter">
            <div id="excerpts"></div>
          </div>
          <div class="previewColumn" id="fullPreviewOuter">
            <button class="previewNav" id="prevChunk" onClick="shiftPreview(false)"></button>
            <div id="fullPreview"></div>
            <button class="previewNav" id="nextChunk" onClick="shiftPreview(true)"></button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="error" class="hidden"></div>
  <ul id="suggestionList" class="suggestions hidden"></ul>
  <script>
    const shortLimit = 50;
    const fullLimit = 500;
    const stringLimit = 80; //kb
    const prefix = "/storage/emulated/0";

    const manageIndex = document.getElementById('manageIndex');
    const currentIndexPath = document.getElementById('currentIndexPath');
    const indexResultContainer = document.getElementById('indexResultContainer');
    const indexedFoldersListEl = document.getElementById('indexedFoldersList');
    const deleteIndexesForFoldersButton = document.getElementById('deleteIndexesForFolders');
    const searchQueryEl = document.getElementById('searchQuery');
    const currentSearchQueryInput = document.getElementById('currentSearchQuery');
    const searchResultEl = document.getElementById('searchResult');
    const previewsEl = document.getElementById('previews');
    const excerptsOuter = document.getElementById('excerptsOuter');
    const excerptsContainer = document.getElementById('excerpts');
    const fullPreviewOuter = document.getElementById('fullPreviewOuter');
    const fullPreviewEl = document.getElementById('fullPreview');
    const progressContainer = document.getElementById('progressContainer');
    const statusMessage = document.getElementById('statusMessage');
    const progressBarEl = document.getElementById('progressBar');
    const progressFileNameEl = document.getElementById('fileName');
    const progressElapsedEl = document.getElementById('elapsed');
    const taskResult = document.getElementById('taskResult');
    const queryValidationMessageEl = document.getElementById('queryValidationMessage');
    const searchButton = document.getElementById('searchButton');
    const errorContainer = document.getElementById('error');
    const mainInner = document.getElementById('mainInner');
    const main = document.querySelector('main');
    const searchResCount = document.getElementById('searchResCount');
    const prefs = document.getElementById('prefs');
    const spinnerGlobal = document.getElementById('spinnerGlobal');
    const closeProgress = document.getElementById('closeProgress');
    const searchResQuery = document.getElementById('searchResQuery');
    const prevChunk = document.getElementById('prevChunk');
    const nextChunk = document.getElementById('nextChunk');
    const lastTaskLog = document.getElementById('lastTaskLog');
    const searchLog = document.getElementById('searchLog');
    const showSearchLog = document.getElementById('showSearchLog');
    const searchLogWrap = document.getElementById('searchLogWrap');
    const allowedExtensions = document.getElementById('allowedExtensions');
    const suggestionList = document.getElementById('suggestionList');
    const mainHeader = document.querySelector('#mainInner > header');
    const searchResultWrap = document.getElementById('searchResultWrap');
    const indexedFoldersListTitle = document.getElementById('indexedFoldersListTitle');
    const pathFilter = document.getElementById('pathFilter');
    const pathFilterInput = document.getElementById('pathFilterInput');
    const theBar = document.getElementById('theBar');
    const menu = document.getElementById('menu');
    const menuTrigger = document.getElementById('menuTrigger');

    let currentFileContent = null;
    let highlightedContent = null;
    let currentSearchResultsEls = [];
    let currentHit = null;

    function saveSearchQuery(query) {
      const keepCount = 10;
      if(!query || typeof query !== 'string') return;
      let recent = getRecentSearches();
      recent = recent.filter(item => item !== query);
      recent.unshift(query);
      if(recent.length > keepCount) {
        recent = recent.slice(0, keepCount);
      }
      localStorage.setItem('recentSearches', JSON.stringify(recent));
    }

    function getRecentSearches() {
      return JSON.parse(localStorage.getItem('recentSearches')) || [];
    }

    function filterSuggestions(value) {
      const recent = getRecentSearches();
      return recent.filter(q => q.toLowerCase().includes(value.toLowerCase()));
    }

    function updateSuggestions() {
      const recent = getRecentSearches();
      suggestionList.innerHTML = '';
      recent.forEach(query => {
        const option = document.createElement('option');
        option.value = query;
        suggestionList.appendChild(option);
      });
    }

    function showSuggestions(filtered) {
      suggestionList.innerHTML = '';
      if(filtered.length === 0) {
        suggestionList.classList.add('hidden');
        return;
      }

      const inputRect = searchQuery.getBoundingClientRect();
      const spaceBelow = window.innerHeight - inputRect.bottom;
      suggestionList.style.maxHeight = `${(spaceBelow - 10)}px`;

      filtered.forEach(query => {
        const li = document.createElement('li');
        li.textContent = query;
        li.onclick = () => {
          searchQuery.value = query;
          suggestionList.classList.add('hidden');
        };
        suggestionList.appendChild(li);
      });
      positionSuggestionList();
      suggestionList.classList.remove('hidden');
    }

    function positionSuggestionList() {
      const rect = searchQuery.getBoundingClientRect();
      suggestionList.style.position = 'absolute';
      suggestionList.style.top = `${rect.bottom + window.scrollY}px`;
      suggestionList.style.left = `${rect.left + window.scrollX}px`;
      suggestionList.style.width = `${rect.width}px`;
      const maxHeight = window.innerHeight - rect.bottom - 10;
      suggestionList.style.maxHeight = `${maxHeight}px`;
    }

    function findTagsWithContext(text, contextLength, tagName) {
      /*
      {
        tag: '<div>DIV</div>',
        before: 'Теги: ',
        after: ' и <',
        start: 6,
        end: 18
      }      
      */
      const regex = new RegExp(
        `<${tagName}(?:\\s[^>]*)?>.*?<\\/${tagName}>`,
        'g'
      );
      const results = [];
      let match;

      while((match = regex.exec(text)) !== null) {
        const start = match.index;
        const end = start + match[0].length;

        results.push({
          tag: match[0],
          before: text.slice(Math.max(0, start - contextLength), start),
          after: text.slice(end, end + contextLength),
          start,
          end
        });

        if(match.index === regex.lastIndex) regex.lastIndex++;
      }

      return results;
    }

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function findAllOccurrencesWithPositions(text, searchString) {
      const regex = new RegExp(escapeRegExp(searchString), 'gi');
      let match;
      const results = [];

      while((match = regex.exec(text)) !== null) {
        results.push(match.index);
        if(match.index === regex.lastIndex) {
          regex.lastIndex++;
        }
      }

      return results;
    }

    function highlightOccurrences(text, searchString) {
      if(!searchString) return text;
      const regex = new RegExp(escapeRegExp(searchString), 'g');
      let matchCount = 0;
      return text.replace(regex, (match) => {
        return `<mark>${match}</mark>`;
      });
    }

      }

      return {
        log: function (message) {
          const now = performance.now();
          const elapsed = now - lastTime;
          if(resetOnLog) lastTime = now;
          console.log(`[${tag}] ${message} (+${format(elapsed)})`);
        },
        logTotal: function (message) {
          const now = performance.now();
          const totalElapsed = now - startTime;
          console.log(`[${tag}] ${message} (TOTAL: ${format(totalElapsed)})`);
        },
        reset: function () {
          startTime = performance.now();
          lastTime = startTime;
        }
      };

    function scrollCurrentIntoViewWithinResultWrap(wrap, current) {
      if(!wrap || !current) return;
      const margin = 15;

      const paddingTop = parseFloat(getComputedStyle(wrap).paddingTop) || 0;
      const wrapScrollTop = wrap.scrollTop;
      const wrapClientHeight = wrap.clientHeight;

      // Абсолютное положение current внутри wrap (с учётом вложенности)
      const currentOffsetTop = current.offsetTop;
      const currentOffsetBottom = currentOffsetTop + current.offsetHeight;

      // Граница видимости: от scrollTop + paddingTop до scrollTop + height
      const visibleTop = wrapScrollTop + paddingTop;
      const visibleBottom = wrapScrollTop + wrapClientHeight;

      // Если current выше видимой области
      if(currentOffsetTop < visibleTop) {
        wrap.scrollTop = currentOffsetTop - paddingTop - margin;
      }
      // Если current ниже видимой области
      else if(currentOffsetBottom > visibleBottom) {
        wrap.scrollTop = currentOffsetBottom - wrapClientHeight + margin;
      }
    }

    let startTouchY = 0;
    let scrollIntentCount = 0;
    let loadCooldown = false;
    const SCROLL_THRESHOLD = 30; // минимальная дельта для жеста
    const SCROLL_INTENT_THRESHOLD = 3; // сколько жестов подряд надо
    let lastTouchY = 0;

    fullPreviewOuter.addEventListener('touchstart', (e) => {
      if(e.touches.length > 0) {
        startTouchY = e.touches[0].clientY;
      }
    }, {passive: true});


    fullPreviewOuter.addEventListener('touchend', (e) => {
      const el = fullPreviewOuter;

      const atTop = el.scrollTop <= 1;
      const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 1;

      const endTouchY = startTouchY; // уже было
      const lastTouchY = e.changedTouches[0].clientY;
      const deltaY = lastTouchY - startTouchY;

      const isUp = deltaY > SCROLL_THRESHOLD;
      const isDown = deltaY < -SCROLL_THRESHOLD;

      const isScrollingFurther =
        (atTop && isUp) ||
        (atBottom && isDown);

      if(isScrollingFurther && !loadCooldown) {
        scrollIntentCount++;
        if(scrollIntentCount >= SCROLL_INTENT_THRESHOLD) {
          scrollIntentCount = 0;
          loadCooldown = true;
          if(atBottom) {
            appendChunk(true);
          } else if(atTop) {
            appendChunk(false);
          }
          setTimeout(() => loadCooldown = false, 500);
        }
      } else {
        scrollIntentCount = 0;
      }
    }, {passive: true});

    function appendChunk(isDown) {
      console.log(`Грузи дальше ${(isDown ? 'вниз' : 'вверх')}!`);
      if(!currentFileContent) return;
      if(!isDown && currentFullStart === null || isDown && currentFullEnd === null) {
        return;
      }
      if(isDown && currentFullEnd === currentFileContent.length
        || !isDown && currentFullStart === 0) return;
      if(isDown) {
        const newFullEnd = Math.min(currentFullEnd + fullLimit, currentFileContent.length);
        const chunk = currentFileContent.substring(currentFullEnd, newFullEnd);
        currentFullEnd = newFullEnd;
        fullPreview.innerHTML = fullPreview.innerHTML + chunk;
      } else {
        // 1. Запоминаем текущую scroll-высоту ДО вставки
        const previousScrollHeight = fullPreviewOuter.scrollHeight;
        // 2. Вставляем контент
        const newFullStart = Math.max(0, currentFullStart - fullLimit);
        const chunk = currentFileContent.substring(newFullStart, currentFullStart);
        currentFullStart = newFullStart;
        fullPreview.innerHTML = chunk + fullPreview.innerHTML;
        // 3. Разница в scrollHeight — это сколько прибавилось сверху
        const addedHeight = fullPreviewOuter.scrollHeight - previousScrollHeight;
        // 4. Прокручиваем вниз на эту величину
        fullPreviewOuter.scrollTop += addedHeight;
      }
    }

    document.addEventListener('touchstart', function (e) {
      const target = e.target;
      if(theBar.contains(target)) {
        main.classList.remove('preventScroll');
      } else {
        main.classList.add('preventScroll');
      }
    }, {passive: true});

    document.addEventListener('click', (e) => {
      if(menu.classList.contains('active') && !menu.contains(e.target)) {
        toggleMenu(e);
      }
    });

    menuTrigger.addEventListener('click', (e) => {
      toggleMenu(e);
    })

    function toggleMenu(e) {
      if (e) {
        e.stopPropagation();
      }
      menu.classList.toggle('active');
    }

  </script>
</body>

</html>
