<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mvd Doc Search Minus</title>
</head>
<style>
  :root {
    --bg: #e9e4e5;
    --bgDeep: #fff;
    --text-color: #010102;
    --button: #b9b9b9;
    --text-accent-border: #828aff;
    --text-accent-bg: #fff;
    --text-accent-bg-deep: var(--bg);
    --inputBg: #fff;
    --borderDefault: var(--text-color);
    --borderNeutral: gray;
    --semiBgOverlayed: #d6cee1a3;
    --currentItemBg: #fff;
    --thinOverlayed: #6c6cbb8c;
    --theBarDots: #2a51b7;
    --dropShadow: #85789b59;
    --errorText: #66001a;
    --appColor: #7c0023;
    --appColor2: #3700b3;
    --paleBorder: #65667b91;
    --iconColor: #3e00cb;
    --iconSecondaryColor: #8c82a3;
    --textSelectionBg: #76687b57;
  }

  body.night {
    --bg: #1e1e1e;
    --bgDeep: #000;
    --text-color: #ad9f98;
    --button: #3c3c3c;
    --text-accent-border: #7c7c7d;
    --text-accent-bg: #343a34;
    --text-accent-bg-deep: #2b302b;
    --inputBg: #464646;
    --errorBox: #7c7c7d;
    --borderDefault: var(--text-color);
    --semiBgOverlayed: #f3f3f326;
    --currentItemBg: #f3f3f326;
    --thinOverlayed: #f3f3f31a;
    --borderNeutral: gray;
    /* --previewNavDotsBg: var(--thinOverlayed); */
    --dropShadow: #000000a1;
    --theBarDots: #808ba7;
    --errorText: #fff;
    --paleBorder: #f3f3f326;
    --iconColor: #7c0023;
    --iconSecondaryColor: #614e53;
    --textSelectionBg: #84858d59;
  }

  ::selection {
    background: var(--textSelectionBg);
  }

  html,
  body {
    width: 100vw;
    height: 100vh;
    margin: 0;
    padding: 0;
  }

  body {
    display: flex;
    flex-flow: column nowrap;
    background: var(--bg);
    color: var(--text-color);
    font-size: 14px;
    position: relative;
  }

  h4,
  h5 {
    margin: 10px 0;
  }

  main {
    box-sizing: border-box;
    padding: 0 0 5px;
    width: 100%;
    max-width: 100%;
    min-height: 0;
    overflow: auto;
    position: relative;
    flex: 1 1 auto;
  }

  main.preventScroll {
    overflow: hidden;
  }

  .dangerousButton {
    border: 1px solid #9e0028;
    border-radius: 3px;
  }

  #mainInner {
    height: 100%;
    max-height: 100%;
    box-sizing: border-box;
  }

  .excerpt {
    cursor: pointer;
    padding: 10px;
    border-bottom: 1px dashed var(--borderDefault);
  }

  .excerpt.current {
    background: var(--currentItemBg);
  }

  .excerpt mark,
  #fullPreview mark {
    color: var(--text-color);
    background: var(--text-accent-bg);
    padding: 0 1px;
    display: inline-block;
    border-radius: 7px;
  }

  .excerpt.current mark {
    background: var(--text-accent-bg-deep);
  }

  section,
  .section {
    border: 1px solid var(--text-accent-border);
    border-radius: 10px;
    padding: 5px;
    margin-bottom: 5px;
  }

  button {
    height: 30px;
    padding: 0 10px;
    box-sizing: border-box;
    background: var(--button);
    outline: none;
    border: 0;
    border-radius: 5px;
    color: var(--text-color);
  }

  .button_small {
    height: 20px;
    padding: 0 5px;
  }

  .icon {
    background-color: transparent;
    height: 30px;
    width: 30px;
    padding: 0;
    border-radius: 0;
    display: flex;
    flex-flow: row nowrap;
    justify-content: center;
    align-items: center;
  }

  .icon path {
    fill: var(--iconColor);
  }

  .icon_secondary path {
    fill: var(--iconSecondaryColor);
  }

  .icon svg {
    display: block;
    width: 100%;
    height: 100%;
  }

  #menu .icon svg,
  #manageIndex .icon svg {
    width: 20px;
    height: 20px;
  }

  #pathFilter .icon svg {
    width: 20px;
    height: 20px;
  }

  input[type="text"],
  input[type="search"],
  textarea {
    background: var(--inputBg);
    border: 1px solid var(--text-accent-border);
    color: var(--text-color);
    font-size: 16px;
    border-radius: 3px;
  }

  .hidden {
    display: none !important;
  }

  #queryValidationMessage,
  #error {
    font-size: 12px;
    padding: 5px;
    color: var(--errorText);
    margin-top: 5px;
  }

  #searchHeader {
    box-shadow: 0px 7px 7px var(--dropShadow);
    border-bottom: 1px solid var(--borderNeutral);
    padding: 15px 0 15px;
    position: fixed;
    background: var(--bg);
    width: 100%;
    box-sizing: border-box;
  }

  #searchWrap {
    flex: 1 1 auto;
  }

  #searchButton {
    width: 50px;
    height: 30px;
    flex: 0 0 auto;
    box-sizing: border-box;
    padding: 5px;
  }

  #searchQuery {
    display: block;
    width: 100%;
    height: 100%;
    outline: none;
  }

  #searchResCount {
    font-weight: bold;
    margin-right: 5px;
  }

  #searchResultWrap {
    max-height: 56vh;
    overflow: auto;
    box-sizing: border-box;
  }

  #searchResultsHeader {
    padding: 10px 15px 0;
    margin-bottom: -5px
  }

  #queryInfo {
    white-space: nowrap;
    padding-right: 5px;
    flex: 1 1 auto;
    font-size: 17px;
  }

  #pathFilter {
    flex: 0 1 auto;
    min-width: 0;
    box-sizing: border-box;
  }

  #pathFilter button {
    flex: 0 0 auto;
    transition: transform 0.3s ease;
  }

  #pathFilterInput {
    display: none;
    flex: 1 1 auto;
    min-width: 0;
    box-sizing: border-box;
    background: transparent;
    border: 0;
    border-radius: 0;
    border-bottom: 1px dashed var(--borderNeutral);
    outline: none;
    height: 20px;
  }

  #pathFilter.expanded #pathFilterInput {
    display: unset;
  }

  #pathFilter.expanded button {
    transform: rotate(90deg);
  }

  #pathOrderDesc {
    margin-left: 5px;
    flex: 0 0 auto;
  }

  #pathOrderDesc svg {
    width: 18px;
    height: 18px;
  }

  #searchResult {
    display: flex;
    flex-flow: column nowrap;
  }

  #searchResult.reversed {
    flex-direction: column-reverse
  }

  .searchResult {
    padding: 5px 15px;
    border-bottom: 1px dashed gray;
    display: flex;
    flex-flow: row nowrap;
    justify-content: space-between;
    overflow: hidden;
    align-items: center;
  }

  .searchResult.current {
    background: var(--currentItemBg);
  }

  .searchResult_details {
    padding-right: 5px;
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
  }

  .searchResult_path {
    font-size: 12px;
    white-space: nowrap;
    text-overflow: clip;
    overflow: hidden;
    direction: rtl;
    text-align: left;
  }

  .searchResult_filename {
    white-space: nowrap;
    text-overflow: clip;
    overflow: hidden;
    direction: rtl;
    text-align: left;
  }

  .searchResult_details>span {
    display: block;
  }

  .searchResult_hits {
    flex: 0 0 auto;
  }

  #indexedFoldersList {
    padding: 0;
    margin: 0;
    list-style: none;
  }

  #indexedFoldersList li {
    display: flex;
    flex-flow: row nowrap;
    align-items: center;
  }

  #indexedFoldersList li+li {
    margin-top: 1px;
    border-top: 1px dotted var(--borderNeutral);
  }

  #indexedFoldersList input {
    flex: 0 0 auto;
    margin-right: 5px;
  }

  #indexedFoldersList li>span {
    overflow-wrap: break-word;
    flex: 1 1 auto;
    font-size: 13px;
  }

  #lastTaskLog {
    padding: 5px;
    white-space: pre-wrap;
    max-height: 70vh;
    overflow: auto;
    flex: 1 0 auto;
    background: var(--bg);
    border-top: 1px solid var(--iconColor);
  }

  #fileName {
    margin: 0;
    padding: 0;
  }

  #previews {
    max-width: 100vw;
    overflow: auto;
    border-bottom-right-radius: 5px;
    height: 65vh;
    width: 100%;
    box-sizing: border-box;
    font-size: 17px;
  }

  #previewColsWrap {
    display: flex;
    flex-flow: row nowrap;
    max-height: 100%;
    height: 100%;
  }

  .previewColumn {
    width: 100%;
    max-height: 100%;
    overflow: auto;
    flex: 1 0 auto;
    height: 100%;
    box-sizing: border-box;
    /* position: relative; */
    /* z-index: -1; */
  }

  .previewNav {
    position: sticky;
    height: 40px;
    width: 100%;
    box-sizing: border-box;
    border: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background-image: radial-gradient(var(--thinOverlayed) 1px, transparent 0px);
    background-repeat: repeat;
    background-size: 4px 4px;
    background-position: center;
    background-color: transparent;
    border-radius: 0;
  }

  .night .previewNav {
    background-image: radial-gradient(var(--thinOverlayed) 1px, transparent 0px);
    background-size: 3px 3px;
  }

  #prevChunk {
    top: 0;
  }

  #nextChunk {
    bottom: 0;
  }

  #fullPreview {
    padding: 5px 15px;
    font-family: sans-serif;
    white-space: pre-wrap;
  }

  #fullPreview.chat {
    white-space: normal;
  }

  #error {
    position: fixed;
    bottom: 5px;
    left: 10px;
    right: 10px;
    text-align: center;
    padding: 10px;
    background: var(--errorBox);
  }

  #menuTrigger {
    width: 45px;
    height: 30px;
    flex: 0 0 auto;
  }

  #menuTrigger svg {
    transform: rotate(90deg);
  }

  #menu {
    background: var(--bg);
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: 500;
    /* border-bottom-right-radius: 5px; */
    justify-content: flex-start;
  }

  #menu.active {
    transform: translateX(0);
    box-shadow: 7px 7px 7px var(--dropShadow);
  }

  #menu button {
    width: 70px;
    height: 70px;
  }

  #manageIndex,
  #prefs {
    padding: 15px 10px;
    height: 100%;
    max-height: 100%;
    overflow: hidden;
    box-sizing: border-box;
  }

  .modal {
    z-index: 500;
    position: fixed !important;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    border: 10px solid var(--semiBgOverlayed);
    background: var(--bg);
  }

  .hasModal {
    overflow: hidden;
  }

  .hasModal:after {
    position: fixed;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 400;
    background: var(--semiBgOverlayed);
  }

  .modal_mini {
    top: 20vh;
    bottom: 20vh;
    left: 20px;
    right: 20px;
  }

  #indexRootsActions {
    padding: 0 15px 10px;
    border-bottom: 2px solid var(--iconColor);
  }

  #indexRootsActions h4,
  #indexRootsActions h5 {
    margin: 0;
  }

  #indexGlobalActions {
    padding: 15px 0 0;
    border-top: 2px solid var(--iconColor);
  }

  #indexedFoldersListContainer {
    overflow: auto;
    flex: 1 0 auto;
    background: var(--bg);
    margin-bottom: 1px;
    padding: 5px;
  }

  #indexResultContainer {
    flex: 1 1 auto;
    min-height: 0;
    overflow: auto;
    padding: 0 10px;
  }

  #theBar {
    height: 20px;
    flex: 0 0 auto;
    background-image: radial-gradient(var(--theBarDots) 1px, transparent 0px);
    background-repeat: repeat;
    background-size: 8px 8px;
    background-position: center;
    background-color: transparent;
    border-top: 10px solid var(--bg);
    border-bottom: 10px solid var(--bg);
    box-shadow: 0px -7px 15px var(--dropShadow), 0px 7px 10px var(--dropShadow);
  }

  .minimalRow,
  .minimalCol {
    flex: 0 1 auto;
  }

  .colFlexContainer {
    display: flex;
    flex-flow: row nowrap;
    align-items: stretch;
  }

  .rowFlexContainer {
    display: flex;
    flex-flow: column nowrap;
    align-items: stretch;
  }

  .justified {
    justify-content: space-between;
  }

  .centered {
    align-items: center !important;
  }

  .wrapped {
    flex-wrap: wrap !important;
  }

  .closeModalButton {
    width: 30px;
    border-radius: 10px;
    text-align: center;
  }

  .closeModal {
    bottom: 10px;
    right: 10px;
    position: absolute;
  }

  .spinner,
  #spinnerGlobal {
    position: fixed;
    z-index: 1000;
    top: 0;
    left: 0;
    bottom: 0;
    right: 0;
    background: var(--semiBgOverlayed);
    display: flex;
    flex-flow: column nowrap;
    justify-content: center;
    align-items: center;
  }

  .spinner:not(.noSpinner):before,
  #spinnerGlobal:not(.noSpinner):before {
    content: " ";
    display: block;
    width: 50px;
    height: 50px;
    margin: 8px;
    border-radius: 50%;
    border: 6.4px solid var(--text-color);
    border-color: var(--text-color) transparent var(--text-color) transparent;
    animation: review-ring 1.2s linear infinite;
  }

  @keyframes review-ring {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  #progressBarWrap {
    height: 60px;
    overflow: hidden;
  }

  #progressContainer,
  #searchLogWrap {
    width: calc(100% - 40px);
    margin: 10px auto;
    background: var(--bg);
    border-radius: 5px;
    padding: 10px 10px 25px;
    border: 1px solid var(--borderNeutral);
    box-sizing: border-box;
    position: relative;

  }

  #closeProgress,
  #closeSearchLog {
    position: absolute;
    bottom: 15px;
    right: 15px;
  }

  #showSearchLog {
    margin-left: 10px;
    flex: 0 0 auto;
  }

  #fileName {
    text-overflow: clip;
    overflow: hidden;
    direction: rtl;
    text-align: left;
    white-space: nowrap;
  }

  #statusMessage {
    height: 80px;
    overflow: auto;
    margin-bottom: 5px;
    border-bottom: 1px dotted var(--text-color);
    padding: 5px;
  }

  #statusMessage.expanded {
    height: 50vh;
    border-bottom: none;
  }

  #statusMessage>div,
  #lastTaskLog>div,
  #searchLog>div {
    padding: 3px 0;
    display: flex;
    flex-flow: row nowrap;
    justify-content: space-between;
    border-bottom: 1px dotted var(--borderNeutral);
  }

  #statusMessage>div>strong,
  #lastTaskLog>div>strong,
  #searchLog>div>strong {
    flex: 0 0 auto;
    padding-left: 5px;
  }

  #searchLog {
    height: 100%;
    overflow: auto;
  }

  #prefs {
    padding: 10px;
  }

  .suggestions {
    position: absolute;
    overflow-y: auto;
    background: var(--bg);
    list-style: none;
    padding: 0;
    margin: 0;
    width: 100%;
    z-index: 1000;
    box-sizing: border-box;
    border: 2px solid var(--inputBg);
    border-radius: 0 0 5px 5px;
  }

  .suggestions li {
    padding: 7px 10px;
    border-bottom: 1px dotted var(--borderNeutral);
  }

  .suggestions li:hover {
    background-color: var(--currentItemBg);
  }

  .chat-message {
    padding: 3px 0;
    border-bottom: 1px dashed var(--semiBgOverlayed);
  }

  .chat-message .from,
  .excerpt.chat .from {
    display: inline-block;
    margin-right: 5px;
    width: 15px;
    text-align: center;
    vertical-align: baseline;
    opacity: 0.3;
  }

  .night .chat-message .from,
  .night .excerpt.chat .from {
    opacity: 0.5;
  }

  .excerpt.chat .date,
  .chat-message .date {
    font-size: 12px;
    opacity: 0.5;
    display: inline-block;
    padding-left: 5px;
    vertical-align: baseline;
  }
</style>

  <div id="spinnerGlobal" class="hidden">
    <div id="progressContainer" class="hidden">
      <div id="statusMessage"></div>
      <div id="progressBarWrap">
        <div id="fileName" class="hidden" data-initial-text="Файл: -">Файл: -</div>
        <div id="elapsed" class="hidden" data-initial-text="Time: -">Time: -</div>
        <progress class="hidden" id="progressBar" value="0" max="100"></progress>
      </div>
      <button id="closeProgress" class="hidden" onclick="toggleSpinner(false)">X</button>
    </div>
  </div>
  <div id="manageIndex" class="rowFlexContainer modal hidden">
    <input type="hidden" id="currentIndexPath" value="">
    <div id="indexRootsActions" class="centered colFlexContainer justified">

  <script>
    const shortLimit = 50;
    const fullLimit = 500;
    const stringLimit = 80; //kb
    const prefix = "/storage/emulated/0";

    const manageIndex = document.getElementById('manageIndex');
    const currentIndexPath = document.getElementById('currentIndexPath');
    const indexResultContainer = document.getElementById('indexResultContainer');
    const indexedFoldersListEl = document.getElementById('indexedFoldersList');
    const deleteIndexesForFoldersButton = document.getElementById('deleteIndexesForFolders');
    const searchQueryEl = document.getElementById('searchQuery');
    const currentSearchQueryInput = document.getElementById('currentSearchQuery');
    const searchResultEl = document.getElementById('searchResult');
    const searchResultsHeader = document.getElementById('searchResultsHeader');
    const previewsEl = document.getElementById('previews');
    const excerptsOuter = document.getElementById('excerptsOuter');
    const excerptsContainer = document.getElementById('excerpts');
    const fullPreviewOuter = document.getElementById('fullPreviewOuter');
    const fullPreviewEl = document.getElementById('fullPreview');
    const progressContainer = document.getElementById('progressContainer');
    const statusMessage = document.getElementById('statusMessage');
    const progressBarEl = document.getElementById('progressBar');
    const progressFileNameEl = document.getElementById('fileName');
    const progressElapsedEl = document.getElementById('elapsed');
    const queryValidationMessageEl = document.getElementById('queryValidationMessage');
    const errorContainer = document.getElementById('error');
    const searchButton = document.getElementById('searchButton');
    const mainInner = document.getElementById('mainInner');
    const main = document.querySelector('main');
    const searchResCount = document.getElementById('searchResCount');
    const prefs = document.getElementById('prefs');
    const spinnerGlobal = document.getElementById('spinnerGlobal');
    const closeProgress = document.getElementById('closeProgress');
    const searchResQuery = document.getElementById('searchResQuery');
    const prevChunk = document.getElementById('prevChunk');
    const nextChunk = document.getElementById('nextChunk');
    const lastTaskLog = document.getElementById('lastTaskLog');
    const searchLog = document.getElementById('searchLog');
    const showSearchLog = document.getElementById('showSearchLog');
    const searchLogWrap = document.getElementById('searchLogWrap');
    const allowedExtensions = document.getElementById('allowedExtensions');
    const suggestionList = document.getElementById('suggestionList');
    const searchHeader = document.querySelector('#searchHeader');
    const searchResultWrap = document.getElementById('searchResultWrap');
    const indexedFoldersListTitle = document.getElementById('indexedFoldersListTitle');
    const pathFilter = document.getElementById('pathFilter');
    const pathFilterInput = document.getElementById('pathFilterInput');
    const theBar = document.getElementById('theBar');
    const menu = document.getElementById('menu');
    const menuTrigger = document.getElementById('menuTrigger');

    let currentFileContent = null;
    let currentChatMessages = null;
    let highlightedContent = null;
    let currentSearchResultsEls = [];
    let currentHit = null;
    let currentExcerpt = null;
    const allowedOverflowFactor = 1.2;

    function saveSearchQuery(query) {
      const keepCount = 30;
      if(!query || typeof query !== 'string') return;
      let recent = getRecentSearches();
      recent = recent.filter(item => item !== query);
      recent.unshift(query);
      if(recent.length > keepCount) {
        recent = recent.slice(0, keepCount);
      }
      localStorage.setItem('recentSearches', JSON.stringify(recent));
    }

    function getRecentSearches() {
      return JSON.parse(localStorage.getItem('recentSearches')) || [];
    }

    function filterSuggestions(value) {
      const recent = getRecentSearches();
      return recent.filter(q => q.toLowerCase().includes(value.toLowerCase()));
    }

    function updateSuggestions() {
      const recent = getRecentSearches();
      suggestionList.innerHTML = '';
      recent.forEach(query => {
        const option = document.createElement('option');
        option.value = query;
        suggestionList.appendChild(option);
      });
    }

    function showSuggestions(filtered) {
      suggestionList.innerHTML = '';
      if(filtered.length === 0) {
        suggestionList.classList.add('hidden');
        return;
      }

      const inputRect = searchQuery.getBoundingClientRect();
      const spaceBelow = window.innerHeight - inputRect.bottom;
      suggestionList.style.maxHeight = `${(spaceBelow - 10)}px`;

      filtered.forEach(query => {
        const li = document.createElement('li');
        li.textContent = query;
        li.onclick = () => {
          searchQuery.value = query;
          doSearch();
        };
        suggestionList.appendChild(li);
      });
      positionSuggestionList();
      suggestionList.classList.remove('hidden');
    }

    function positionSuggestionList() {
      const rect = searchQuery.getBoundingClientRect();
      suggestionList.style.position = 'absolute';
      suggestionList.style.top = `${rect.bottom + window.scrollY}px`;
      suggestionList.style.left = `${rect.left + window.scrollX}px`;
      suggestionList.style.width = `${rect.width}px`;
      const maxHeight = window.innerHeight - rect.bottom - 10;
      suggestionList.style.maxHeight = `${maxHeight}px`;
    }

    document.addEventListener('click', (e) => {
      if(!searchQuery.contains(e.target) && !suggestionList.contains(e.target)) {
        suggestionList.classList.add('hidden');
      }
    });

    searchQuery.addEventListener('compositionstart', () => {
      isComposing = true;
    });

    let isComposing = false;
    let composingText = '';

    searchQuery.addEventListener('compositionupdate', (e) => {
      composingText = e.data;
      showSuggestions(filterSuggestions(composingText));
    });

    searchQuery.addEventListener('compositionend', () => {
      isComposing = false;
      composingText = '';
      showSuggestions(filterSuggestions(searchQuery.value));
    });

    searchQuery.addEventListener('focus', () => {
      showSuggestions(filterSuggestions(searchQuery.value));
    });

    searchQuery.addEventListener('input', () => {
      if(!isComposing) {
        showSuggestions(filterSuggestions(searchQuery.value));
      }
    });

    searchQuery.addEventListener('keyup', (e) => {
      if(e.keyCode === 13) {
        doSearch();
      }
    })

    function resetSearchState() {
      excerptsContainer.innerHTML = '';
      fullPreviewEl.innerHTML = '';
      searchResultEl.innerHTML = '';
      searchResult.innerHTML = '';
      searchResCount.innerHTML = '';
      showSearchLog.classList.add('hidden');
      suggestionList.classList.add('hidden');
      searchLog.innerHTML = '';
      currentHit = null;
      currentExcerpt = null;
      currentFullStart = null;
      currentFullEnd = null;
      currentFullMsgStart = null;
      currentFullMsgEnd = null;
      currentChatMessages = null;
      if(pathFilter.classList.contains('expanded')) {
        togglePathFilter();
      }
      previewsEl.scroll({
        left: 0,
        behavior: 'smooth'
      })
    }

    function doSearch() {
      if(!searchQueryEl.value.trim()) return;
      if(containsDisallowedCharacters(searchQueryEl.value.trim())) {
        toggleQueryValidationMessage(true);
        currentSearchQueryInput.value = '';
        return;
      }
      const timer = createLogTimer('WebClient', false);
      timer.log('front: doSearch started');

      resetSearchState();

      currentSearchQueryInput.value = searchQueryEl.value.trim();

      saveSearchQuery(currentSearchQueryInput.value);

      toggleSpinner(true);

      setTimeout(() => {
        timer.log('front: calling Android.doSearch');
        searchResultsHeader.classList.remove('hidden');

        const data = Android.doSearch(searchQueryEl.value.trim());

        const res = JSON.parse(data);
        if(res.error) {
          searchResultEl.innerHTML = res.error + '<br>' + res.errorDetails;;
        } else {
          const parsed = res.data;
          searchResCount.textContent = parsed.length;
          searchResQuery.textContent = currentSearchQueryInput.value;
          searchResultEl.innerHTML = parsed.map(o => {
            const actualPath = o.path.startsWith(prefix) ? o.path.slice(prefix.length) : o.path;
            const parts = actualPath.split('/');
            const filename = parts.pop();
            const path = parts.join('/') + '/';
            return `
          <div class="searchResult" data-file-id="${o.fileId}" data-file-path="${o.path}">
            <span class="searchResult_details">
              <span class="searchResult_filename">${filename}</span>
              <span class="searchResult_path">${path}</span>
            </span>
            <span class="searchResult_hits">${o.hits}</span>
          </div>
        `
          }).join('');
          toggleSpinner(false);
          main.scroll({
            top: 0,
            behavior: 'smooth'
          });
          currentSearchResultsEls = [...document.querySelectorAll('.searchResult')];
          setSearchResLayout();
          setPreviewZoneLayout();
        }
        timer.logTotal('front: doSearch finished');
      }, 0);
    }

    function onFolderChosen(path) {
      if(confirm("Проиндексировать папку " + path.replace(prefix, '') + "?")) {
        currentIndexPath.value = path;
        toggleSpinner(true);
        setTimeout(() => {
          Android.indexFolder(currentIndexPath.value);
        }, 0);
      }
    }

    function showExcerpts(path) {
      console.log('front: loading file content', path);
      const query = currentSearchQueryInput.value;
      const response = JSON.parse(Android.getFileContent(path));
      if(response.success) {

        excerptsContainer.innerHTML = '';
        fullPreviewEl.innerHTML = '';
        excerptsContainer.style.display = 'none';
        fullPreviewEl.style.display = 'none';
        previewsEl.scroll({
          left: 0,
          behavior: 'smooth'
        });

        const excerpts = [];

        if(isLikelyChatFile(path, response.data)) {
          const jsonText = extractJsonArrayFromJsFile(response.data);
          currentChatMessages = JSON.parse(jsonText);
          currentFileContent = null;
          const regex = new RegExp(escapeRegExp(query), 'gi');
          let firstHitIndex = null;
          let firstMsgIndex = null;

          currentChatMessages.forEach((msg, msgIndex) => {
            const text = msg.t;
            if(!text) return;

            let match;
            while((match = regex.exec(text)) !== null) {
              const index = match.index;
              if(firstHitIndex === null) { //самый первый фрагмент
                firstHitIndex = index;
                firstMsgIndex = msgIndex;
              }
              const matchLength = query.length;

              const contextStart = Math.max(0, index - shortLimit);
              const contextEnd = Math.min(text.length, index + matchLength + shortLimit);
              const contextLength = contextEnd - contextStart;

              const shouldTrim = contextLength > (shortLimit * 2 * allowedOverflowFactor);
              let before = text.slice(contextStart, index);
              let after = text.slice(index + matchLength, contextEnd);
              const hit = text.slice(index, index + matchLength);

              // если нужно, добавим многоточие при усечении
              if(shouldTrim && contextStart > 0) before = '…' + before;
              if(shouldTrim && contextEnd < text.length) after = after + '…';

              excerpts.push(`
                <div class="excerpt chat" data-msg-index="${msgIndex}" data-char-index="${index}">
                  <div class="text">
                    <span class="from">${msg.f}</span>: ${before}<mark>${hit}</mark>${after}<span class="date">${msg.d.replace('T', ' ')}</span>
                  </div>
                </div>
              `);

              if(regex.lastIndex === index) regex.lastIndex++;
            }
          });
          displayFullFragmentForJson(firstMsgIndex, firstHitIndex);

        } else {
          currentFileContent = response.data;
          currentChatMessages = null;
          const indexes = findAllOccurrencesWithPositions(query);
          indexes.forEach((index, i) => {
            const textBefore = currentFileContent.substring(Math.max(0, index - shortLimit), index);
            const textAfter = currentFileContent.substring(index + query.length, index + query.length + shortLimit);
            const trueQuery = currentFileContent.substring(index, index + query.length);
            excerpts.push(`<div class="excerpt" data-index="${index}">${textBefore}<mark>${trueQuery}</mark>${textAfter}</div>`);
          });
          displayFullFragment(indexes[0], indexes);
        }

        excerptsContainer.innerHTML = excerpts.join('');
        excerptsContainer.style.display = '';
        setPreviewZoneLayout();
        prevChunk.classList.add('hidden');
      } else {
        console.error('front: getFileContent error:', response.error);
        console.debug('details :', response.errorDetails);
        showError(response.error);
      }
    }

    let currentFullStart = null;
    let currentFullEnd = null;

    function displayFullFragment(index, indexes) {
      fullPreviewEl.classList.remove('chat');
      const query = currentSearchQueryInput.value;

      setJumpNextElsState();

      currentFullStart = Math.max(0, index - fullLimit);
      currentFullEnd = Math.min(index + query.length + fullLimit, currentFileContent.length);
      const textBefore = highlightOccurrences(currentFileContent.substring(currentFullStart, index), query);
      const textAfter = highlightOccurrences(currentFileContent.substring(index + query.length, currentFullEnd), query);
      const trueQuery = currentFileContent.substring(index, index + query.length);
      fullPreviewEl.innerHTML = `${textBefore}<mark data-index="${index}">${trueQuery}</mark>${textAfter}`;

      const currentMatch = fullPreviewEl.querySelector('[data-index="' + index + '"]');
      fullPreviewEl.style.display = '';
      const targetScrollTop = getInnerElScrollTopToCenterOfOuter(fullPreviewOuter, currentMatch);
      fullPreviewOuter.scrollTop = targetScrollTop;
    }

    let currentFullMsgStart = null;
    let currentFullMsgEnd = null;

    function displayFullFragmentForJson(msgIndex, charIndex) {
      fullPreviewEl.classList.add('chat');
      const query = currentSearchQueryInput.value;

      setJumpNextElsState();

      const fullMessages = [];
      const lowerQuery = query.toLowerCase();
      const regex = new RegExp(escapeRegExp(query), 'gi');

      // Подсчитаем "вес" центрального сообщения
      const centerMsg = currentChatMessages[msgIndex];
      const contextBefore = [];
      const contextAfter = [];

      let budgetBefore = fullLimit;
      let budgetAfter = fullLimit;

      // Добавляем ДО
      for(let i = msgIndex - 1;i >= 0;i--) {
        const msg = currentChatMessages[i];
        const len = msg.t?.length || 0;
        if(len > budgetBefore) break;
        contextBefore.unshift(msg);
        budgetBefore -= len;
      }

      // Добавляем ПОСЛЕ
      for(let i = msgIndex + 1;i < currentChatMessages.length;i++) {
        const msg = currentChatMessages[i];
        const len = msg.t?.length || 0;
        if(len > budgetAfter) break;
        contextAfter.push(msg);
        budgetAfter -= len;
      }

      // Дополнительное добивание остатком, если надо
      let leftover = budgetBefore + budgetAfter;

      // Сначала добиваем ДО
      for(let i = msgIndex - 1 - contextBefore.length;i >= 0 && leftover > 0;i--) {
        const msg = currentChatMessages[i];
        const len = msg.t?.length || 0;
        if(len > leftover) break;
        contextBefore.unshift(msg);
        leftover -= len;
      }

      // Потом добиваем ПОСЛЕ
      for(let i = msgIndex + 1 + contextAfter.length;i < currentChatMessages.length && leftover > 0;i++) {
        const msg = currentChatMessages[i];
        const len = msg.t?.length || 0;
        if(len > leftover) break;
        contextAfter.push(msg);
        leftover -= len;
      }

      const allContextMessages = [...contextBefore, centerMsg, ...contextAfter];

      currentFullMsgStart = msgIndex - contextBefore.length;
      currentFullMsgEnd = msgIndex + 1 + contextAfter.length; // не включительно

      fullPreviewEl.innerHTML = allContextMessages
        .map((msg, i) => {
          const index = contextBefore.length + i; // смещение
          const globalMsgIndex = msgIndex - contextBefore.length + i;

          const isCenter = globalMsgIndex === msgIndex;
          const rawText = msg.t || '';

          const textHtml = rawText
            ? highlightWithMainMark(rawText, isCenter ? charIndex : -1)
            : '';

          return `
        <div class="chat-message ${isCenter ? 'focused' : ''}">
          <div class="text">
              <span class="from">${msg.f}</span>: 
              ${textHtml}
              <span class="date">${msg.d.replace('T', ' ')}</span>
          </div>
        </div>
      `;
        })
        .join('');

      // Прокрутим к основному совпадению
      const currentMatch = fullPreviewEl.querySelector('mark.main-hit');
      fullPreviewEl.style.display = '';
      const targetScrollTop = getInnerElScrollTopToCenterOfOuter(fullPreviewOuter, currentMatch);
      fullPreviewOuter.scrollTop = targetScrollTop;
    }

    function highlightWithMainMark(text, charIndex) {
      const query = currentSearchQueryInput.value;
      const regex = new RegExp(escapeRegExp(query), 'gi');
      let result = '';
      let match;
      let lastIndex = 0;

      regex.lastIndex = 0;

      while((match = regex.exec(text)) !== null) {
        const i = match.index;
        const partBefore = text.slice(lastIndex, i);
        const partMatch = match[0];
        const isMain = (i === charIndex); // локальный индекс в этом тексте

        result += partBefore;
        result += isMain
          ? `<mark class="main-hit" data-index="${charIndex}">${partMatch}</mark>`
          : `<mark>${partMatch}</mark>`;

        lastIndex = i + partMatch.length;

        if(regex.lastIndex === i) regex.lastIndex++;
      }
      result += text.slice(lastIndex);
      return result;
    }

    function setJumpNextElsState() {
      const currentExcerpt = excerptsContainer.querySelector('.current');
      let prevExcerpt = null;
      let nextExcerpt = null;
      if(currentExcerpt) {
        prevExcerpt = currentExcerpt.previousElementSibling ? currentExcerpt.previousElementSibling : null;
        nextExcerpt = currentExcerpt.nextElementSibling ? currentExcerpt.nextElementSibling : null;
      } else {
        const firstExcerpt = excerptsContainer.querySelector('.excerpt');
        if(firstExcerpt) {
          nextExcerpt = firstExcerpt.nextElementSibling;
        }
      }
      prevChunk.classList.toggle('hidden', !prevExcerpt);
      nextChunk.classList.toggle('hidden', !nextExcerpt);
    }

    document.addEventListener('click', (e) => {
      const searchResEl = e.target.classList.contains('searchResult') ? e.target : e.target.closest('.searchResult');
      if(searchResEl) {
        if(currentHit != null) {
          currentHit.classList.remove('current');
        }
        searchResEl.classList.add('current');
        currentHit = searchResEl;
        showExcerpts(searchResEl.dataset.filePath);
      }
    });

    document.addEventListener('click', (e) => {
      const excerptEl = e.target.classList.contains('excerpt') ? e.target : e.target.closest('.excerpt');
      if(excerptEl) {
        document.querySelector('.excerpt.current')?.classList.remove('current');
        excerptEl.classList.add('current');
        currentExcerpt = excerptEl;
        if(excerptEl.classList.contains('chat')) {
          const msgIndex = parseInt(excerptEl.dataset.msgIndex, 10);
          const charIndex = parseInt(excerptEl.dataset.charIndex, 10);
          displayFullFragmentForJson(msgIndex, charIndex);
        } else {
          displayFullFragment(parseInt(excerptEl.dataset.index));
        }
        previewsEl.scrollTo({
          left: fullPreviewOuter.offsetLeft,
          behavior: 'smooth'
        });
      }
    });

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function findAllOccurrencesWithPositions(searchString) {
      const results = [];
      if(!currentFileContent) return;
      const regex = new RegExp(escapeRegExp(searchString), 'gi');
      let match;

      while((match = regex.exec(currentFileContent)) !== null) {
        results.push(match.index);
        if(match.index === regex.lastIndex) {
          regex.lastIndex++;
        }
      }

      return results;
    }

    function highlightOccurrences(text, searchString) {
      if(!searchString) return text;
      const regex = new RegExp(escapeRegExp(searchString), 'g');
      let matchCount = 0;
      return text.replace(regex, (match) => {
        return `<mark>${match}</mark>`;
      });
    }

    function updateProgressUiEl(el, data) {

    function renderProgress(data, isFinished) {

    function shiftPreview(goDown) {
      console.log('front: shiftPreview', goDown);

    function getInnerElScrollTopToCenterOfOuter(outer, inner) {
      const innerRect = inner.getBoundingClientRect();
      const outerRect = outer.getBoundingClientRect();
      const relativeTop = innerRect.top - outerRect.top + outer.scrollTop;
      const targetScroll = relativeTop - (outer.clientHeight / 2) + (inner.clientHeight / 2);
      return Math.min(targetScroll, outer.scrollHeight - outer.clientHeight)
    }

    function toggleQueryValidationMessage(show) {

    function containsDisallowedCharacters(str) {
      const punctuationOrSymbol = /[\p{P}\p{So}〆〤\u3000\u3001\u3002\u300C\u300D\u300E\u300F]/u;
      const emoji = /[\uD83C-\uDBFF][\uDC00-\uDFFF]/;
      const whitespace = /\s/;
      return punctuationOrSymbol.test(str) || emoji.test(str) || whitespace.test(str);
    }

    function validateQuery(input) {

    }

    function createLogTimer(tag, resetOnLog) {
      let startTime = performance.now();
      let lastTime = startTime;

      function format(ms) {
        return ms < 1000 ? `${ms.toFixed(0)} ms` : `${(ms / 1000).toFixed(2)} s`;
      }

      return {
        log: function (message) {
          const now = performance.now();
          const elapsed = now - lastTime;
          if(resetOnLog) lastTime = now;
          console.log(`[${tag}] ${message} (+${format(elapsed)})`);
        },
        logTotal: function (message) {
          const now = performance.now();
          const totalElapsed = now - startTime;
          console.log(`[${tag}] ${message} (TOTAL: ${format(totalElapsed)})`);
        },
        reset: function () {
          startTime = performance.now();
          lastTime = startTime;
        }
      };
    }

    function showExceptionsPrompt(defaults) {

    function setSearchResLayout() {
      const paddingTop = searchHeader.offsetHeight + main.scrollTop;
      searchResultWrap.style.paddingTop = paddingTop + 'px';
    }

    function setPreviewZoneLayout() {
      const currEx = currentExcerpt ? currentExcerpt : document.querySelector('.excerpt');
      const paddingBottom = main.scrollHeight - main.clientHeight - main.scrollTop;
      if(!currEx) {
        previewsEl.style.paddingBottom = paddingBottom + 'px';
        return;
      }
      const visibleHeight = previewsEl.clientHeight - paddingBottom;
      if(visibleHeight > currEx.offsetHeight * 1.5) {
        previewsEl.style.paddingBottom = paddingBottom + 'px';
      }
    }

    let scrollTimeout;

    main.addEventListener('scroll', () => {
      clearTimeout(scrollTimeout);

      scrollTimeout = setTimeout(() => {
        scrollCurrentIntoViewWithinResultWrap(searchResultWrap, currentHit);
        scrollCurrentExcerptIntoView(excerptsOuter, currentExcerpt);
      }, 200);

      setSearchResLayout();
      setPreviewZoneLayout();
    });

    setSearchResLayout();
    setPreviewZoneLayout();

    function scrollCurrentExcerptIntoView() {
      const outer = excerptsOuter;
      const current = currentExcerpt;

      if(!outer || !current) return;

      const outerRect = outer.getBoundingClientRect();
      const currentRect = current.getBoundingClientRect();

      const margin = 15; // запас сверху и снизу

      const currentTopWithin = currentRect.top - outerRect.top;
      const currentBottomWithin = currentRect.bottom - outerRect.top;

      const visibleTop = outer.scrollTop;
      const visibleBottom = visibleTop + outer.clientHeight;

      const currentTop = visibleTop + currentTopWithin;
      const currentBottom = visibleTop + currentBottomWithin;

      // Если верх current выше видимой области
      if(currentTop < visibleTop + margin) {
        outer.scrollTop = currentTop - margin;
      }
      // Если низ current ниже видимой области
      else if(currentBottom > visibleBottom - margin) {
        outer.scrollTop = currentBottom - outer.clientHeight + margin;
      }
    }

    function scrollCurrentIntoViewWithinResultWrap() {
      const wrap = searchResultWrap;
      const current = currentHit;
      if(!wrap || !current) return;
      const margin = 15;

      const paddingTop = parseFloat(getComputedStyle(wrap).paddingTop) || 0;
      const wrapScrollTop = wrap.scrollTop;
      const wrapClientHeight = wrap.clientHeight;

      // Абсолютное положение current внутри wrap (с учётом вложенности)
      const currentOffsetTop = current.offsetTop;
      const currentOffsetBottom = currentOffsetTop + current.offsetHeight;

      // Граница видимости: от scrollTop + paddingTop до scrollTop + height
      const visibleTop = wrapScrollTop + paddingTop;
      const visibleBottom = wrapScrollTop + wrapClientHeight;

      // Если current выше видимой области
      if(currentOffsetTop < visibleTop) {
        wrap.scrollTop = currentOffsetTop - paddingTop - margin;
      }
      // Если current ниже видимой области
      else if(currentOffsetBottom > visibleBottom) {
        wrap.scrollTop = currentOffsetBottom - wrapClientHeight + margin;
      }
    }

    function togglePathFilter() {
      pathFilter.classList.toggle('expanded');
      if(!pathFilter.classList.contains('expanded')) {
        pathFilterInput.value = '';
        pathFilterInput.dispatchEvent(new Event('input'));
        //currentSearchResultsEls.forEach(el => el.style.display = '');
      } else {

    pathFilterInput.addEventListener('input', () => {
      console.log('search res filter input');
      if(pathFilterInput.value.trim().toLowerCase().length > 2) {
        currentSearchResultsEls.forEach(el => {
          el.style.display = el.dataset.filePath.toLowerCase().indexOf(pathFilterInput.value) >= 0 ? '' : 'none';
        })
        searchResCount.textContent = currentSearchResultsEls.filter(el => el.style.display !== 'none').length;
      } else {
        currentSearchResultsEls.forEach(el => el.style.display = '');
        searchResCount.textContent = currentSearchResultsEls.length;
      }
      setSearchResLayout();
      setPreviewZoneLayout();
    });

    let startTouchY = 0;
    let scrollIntentCount = 0;
    let loadCooldown = false;
    const SCROLL_THRESHOLD = 30; // минимальная дельта для жеста
    const SCROLL_INTENT_THRESHOLD = 3; // сколько жестов подряд надо
    let lastTouchY = 0;

    fullPreviewOuter.addEventListener('touchstart', (e) => {
      if(e.touches.length > 0) {
        startTouchY = e.touches[0].clientY;
      }
    }, {passive: true});


    fullPreviewOuter.addEventListener('touchend', (e) => {
      const el = fullPreviewOuter;

      const atTop = el.scrollTop <= 1;
      const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 1;

      const endTouchY = startTouchY; // уже было
      const lastTouchY = e.changedTouches[0].clientY;
      const deltaY = lastTouchY - startTouchY;

      const isUp = deltaY > SCROLL_THRESHOLD;
      const isDown = deltaY < -SCROLL_THRESHOLD;

      const isScrollingFurther =
        (atTop && isUp) ||
        (atBottom && isDown);

      if(isScrollingFurther && !loadCooldown) {
        scrollIntentCount++;
        if(scrollIntentCount >= SCROLL_INTENT_THRESHOLD) {
          scrollIntentCount = 0;
          loadCooldown = true;
          if(atBottom) {
            if(currentChatMessages !== null) {
              appendChunkForJson(true);
            } else {
              appendChunk(true);
            }
          } else if(atTop) {
            if(currentChatMessages !== null) {
              appendChunkForJson(false);
            } else {
              appendChunk(false);
            }
          }
          setTimeout(() => loadCooldown = false, 500);
        }
      } else {
        scrollIntentCount = 0;
      }
    }, {passive: true});

    function appendChunk(isDown) {
      console.log(`Грузи дальше ${(isDown ? 'вниз' : 'вверх')}!`);
      if(!currentFileContent) return;
      if(!isDown && currentFullStart === null || isDown && currentFullEnd === null) {
        return;
      }
      if(isDown && currentFullEnd === currentFileContent.length
        || !isDown && currentFullStart === 0) return;
      if(isDown) {
        const newFullEnd = Math.min(currentFullEnd + fullLimit, currentFileContent.length);
        const chunk = currentFileContent.substring(currentFullEnd, newFullEnd);
        currentFullEnd = newFullEnd;
        fullPreview.innerHTML = fullPreview.innerHTML + chunk;
      } else {
        // 1. Запоминаем текущую scroll-высоту ДО вставки
        const previousScrollHeight = fullPreviewOuter.scrollHeight;
        // 2. Вставляем контент
        const newFullStart = Math.max(0, currentFullStart - fullLimit);
        const chunk = currentFileContent.substring(newFullStart, currentFullStart);
        currentFullStart = newFullStart;
        fullPreview.innerHTML = chunk + fullPreview.innerHTML;
        // 3. Разница в scrollHeight — это сколько прибавилось сверху
        const addedHeight = fullPreviewOuter.scrollHeight - previousScrollHeight;
        // 4. Прокручиваем вниз на эту величину
        fullPreviewOuter.scrollTop += addedHeight;
      }
    }

    function appendChunkForJson(isDown) {
      console.log(`Грузи дальше ${(isDown ? 'вниз' : 'вверх')}!`);
      if(!currentChatMessages || currentFullMsgStart === null || currentFullMsgEnd === null) return;

      const chunk = [];
      let budget = fullLimit;

      if(isDown) {
        if(currentFullMsgEnd >= currentChatMessages.length) return;

        for(let i = currentFullMsgEnd;i < currentChatMessages.length && budget > 0;i++) {
          const msg = currentChatMessages[i];
          const len = msg.t?.length || 0;
          if(len > budget) break;
          chunk.push(msg);
          budget -= len;
          currentFullMsgEnd++;
        }

        const html = getChatMessageHtml(chunk);

        fullPreviewEl.innerHTML += html;

      } else {
        if(currentFullMsgStart <= 0) return;

        const previousScrollHeight = fullPreviewOuter.scrollHeight;

        for(let i = currentFullMsgStart - 1;i >= 0 && budget > 0;i--) {
          const msg = currentChatMessages[i];
          const len = msg.t?.length || 0;
          if(len > budget) break;
          chunk.unshift(msg);
          budget -= len;
          currentFullMsgStart--;
        }

        const html = getChatMessageHtml(chunk);

        fullPreviewEl.innerHTML = html + fullPreviewEl.innerHTML;

        const addedHeight = fullPreviewOuter.scrollHeight - previousScrollHeight;
        fullPreviewOuter.scrollTop += addedHeight;
      }
    }

    function getChatMessageHtml(chunk) {
      return chunk.map((msg) => {
        const rawText = msg.t || '';
        const textHtml = rawText ? highlightWithMainMark(rawText, -1) : '';
        return `
        <div class="chat-message">
          <div class="text">
            <span class="from">${msg.f}</span>: 
            ${textHtml}
            <span class="date">${msg.d.replace('T', ' ')}</span>
          </div>
        </div>
      `;
      }).join('')
    }

    document.addEventListener('touchstart', function (e) {
      const target = e.target;
      if(theBar.contains(target)) {
        main.classList.remove('preventScroll');
      } else {
        main.classList.add('preventScroll');
      }
    }, {passive: true});

    document.addEventListener('touchend', function (e) {
      main.classList.remove('preventScroll');
    }, {passive: true});

    document.addEventListener('click', (e) => {
      if(menu.classList.contains('active') && !menu.contains(e.target)) {
        toggleMenu(e);
      }
    });

    menuTrigger.addEventListener('click', (e) => {
      toggleMenu(e);
    })

    function toggleMenu(e) {
      if(e) {
        e.stopPropagation();
      }
      menu.classList.toggle('active');
    }

    function reorderSearchResults() {
      searchResultEl.classList.toggle('reversed');
    }

    function isLikelyChatFile(path, text) {
      const isChatFilename = /(?:^|\/)chat[-_]data\d+\.js$/i.test(path);
      const isChatFormat = /^\s*var\s+data\d+\s*=\s*\[/.test(text);
      return isChatFilename && isChatFormat;
    }

    function extractJsonArrayFromJsFile(text) {
      const match = text.match(/^\s*var\s+data\d+\s*=\s*(\[.*)$/s);
      if(!match) return null;

      let jsonText = match[1].trim();

      // Удаляем запятую перед закрывающей скобкой ] (в конце массива)
      jsonText = jsonText.replace(/,\s*]$/, ']');

      return jsonText;
    }
