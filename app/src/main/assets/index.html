            <!--
START
Альтернативная гипотеза: Суффиксный массив
Нормализация текста: Все документы объединены в одну строку без разделителей.

Индекс: Суффиксный массив для быстрого поиска подстрок.

Плюсы:

Молниеносный поиск любых подстрок (даже 100+ символов).

Игнорирование структуры текста (переносы, пробелы).

Минусы:

Поиск частых символов (например, は) требует обработки множества суффиксов → медленно.

Размер индекса ~60 МБ (суффиксный массив + исходный текст).

Итог
Наиболее вероятные варианты:

n-gram индекс (биграммы) + позиции с оптимизацией для длинных запросов.

Суффиксный массив на нормализованном тексте.

Обе гипотезы объясняют поведение приложения, но суффиксный массив лучше соответствует скорости длинных запросов.

Мы разрабатываем приложение, аналогичное вышеописанному, для поиска по текстам, содержащим смешанные языки. При этом из перечисленных выше особенностей работы приложения-прототипа далеко не все нам нужны. НЕ НУЖНО:

- поиск через перенос строки или через знаки препинания - то есть мы не ищем текст "私、嬉しい"　через запрос "私嬉", но будем искать "嬉し"
- поиск по длинным кускам текста (текст целого предложения, или текст целого абзаца)

Таким образом, если предложенная реализация будет содержать этот функционал, ничего страшного, но специально придумывать архитектуру, чтобы эти 2 пункта были возможны, не нужно! Нужен поиск по частичным совпадениям в рамках естественных блоков текста - предложений, строк (перенос строк). Нужно, чтобы искались отдельные символы (蚊) и частичные совпадения.

  <script>
    const excerptLimit = 50;
    const fullLimit = 500;
    const prefix = "/storage/emulated/0";

    const buildIndexButton = document.getElementById('buildIndex');
    const currentIndexPathInput = document.getElementById('currentIndexPath');
    const currentIndexEl = document.getElementById('currentIndex');
    const indexResultEl = document.getElementById('indexResult');
    const searchQueryEl = document.getElementById('searchQuery');
    const currentSearchQueryInput = document.getElementById('currentSearchQuery');
    const searchResultEl = document.getElementById('searchResult');
    const previewsEl = document.getElementById('previews');
    const excerptsOuter = document.getElementById('excerptsOuter');
    const excerptsContainer = document.getElementById('excerpts');
    const fullPreviewOuter = document.getElementById('fullPreviewOuter');
    const fullPreviewEl = document.getElementById('fullPreview');
    const indexPregressContainer = document.getElementById('progressContainer');

    let currentFileContent = null;


    function doSearch() {
      console.log('front: starting search');
      if (!searchQueryEl.value.trim()) return;
      searchResult.innerHTML = '';
      excerptsContainer.innerHTML = '';
      fullPreviewEl.innerHTML = '';
      currentSearchQueryInput.value = searchQueryEl.value;
      const res = Android.doSearch(searchQueryEl.value.trim());
      console.log('front: search result: ', res);
      if (looksLikeJSON(res)) {
        searchResultEl.innerHTML = JSON.parse(res).map(o => {
          return `
          <div class="searchResult" data-file-id="${o.id}" data-file-path="${o.path}">
            <span class="searchResult_path">${o.path.startsWith(prefix) ? o.path.slice(prefix.length) : o.path}</span>
            <span class="searchResult_hits">${o.hits}</span>
          </div>
        `
        }).join('');
      } else {
        searchResultEl.innerHTML = res
      }
    }

    buildIndexButton.addEventListener('click', (e) => {
      console.log('build index button clicked');
      Android.indexFolder(currentIndexPathInput.value);
    });

    function onFolderChosen(path) {
      console.log('front: folder chosen', path);
      currentIndexPathInput.value = path;
      currentIndexEl.innerHTML = 'Текущая папка:<br>' + path;
    }

    function showExcerpts(path) {
      console.log('front: loading file content', path);
      const query = currentSearchQueryInput.value;
      currentFileContent = Android.getFileContent(path);
      excerptsContainer.innerHTML = '';
      excerptsContainer.style.display = 'none';
      fullPreviewEl.style.display = 'none';
      fullPreviewEl.innerHTML = '';
      previewsEl.scroll({
        left: 0,
        behavior: 'smooth'
      })
      const excerpts = [];
      findAllOccurrencesWithPositions(currentFileContent, query).forEach((index, i) => {
        const textBefore = currentFileContent.substring(Math.max(0, index - excerptLimit), index);
        const textAfter = currentFileContent.substring(index + query.length, index + query.length + excerptLimit);
        excerpts.push(`<div class="excerpt" data-index="${index}">${textBefore}<strong>${query}</strong>${textAfter}</div>`);
        if (i == 0) {
          displayFullFragment(index);
        }
      });
      excerptsContainer.innerHTML = excerpts.join('');
      excerptsContainer.style.display = '';
      console.log('front: excerpts container revealed');
    }

    function displayFullFragment(index) {
      console.log('front: getting Full Fragment for index ' + index);
      const query = currentSearchQueryInput.value;
      console.log('front: query length: ' + query.length);
      console.log('front: query ', query);
      
      console.log('front: textBefore, from, to: ', (Math.max(0, index - fullLimit)), index);
      const textBefore = currentFileContent.substring(Math.max(0, index - fullLimit), index);
      console.log('front: textBefore: ', textBefore);

      console.log('front: textAfter, from, to: ', (index + query.length), Math.min(index + query.length + fullLimit, currentFileContent.length));
      const textAfter = currentFileContent.substring(index + query.length, Math.min(index + query.length + fullLimit, currentFileContent.length));
      console.log('front: textAfter: ', textAfter);
      
      fullPreviewEl.innerHTML = `${textBefore}<strong data-index="${index}">${query}</strong>${textAfter}`;
      
      const currentMatch = fullPreviewEl.querySelector('[data-index="' + index + '"]');
      fullPreviewEl.style.display = '';
      const targetScrollTop = currentMatch.offsetTop - currentMatch.offsetHeight - (fullPreviewOuter.offsetHeight/2)
      fullPreviewOuter.scrollTo({
        top: targetScrollTop,
        behavior: 'smooth'
      });
    }

    function looksLikeJSON(str) {
      str = str.trim();
      return (str.startsWith('{') && str.endsWith('}')) ||
        (str.startsWith('[') && str.endsWith(']'));
    }

    document.addEventListener('click', (e) => {
      const searchResEl = e.target.classList.contains('searchResult') ? e.target : e.target.closest('.searchResult');
      if (searchResEl) {
        console.log('front: search result element clicked')
        showExcerpts(searchResEl.dataset.filePath);
      }
    });

    document.addEventListener('click', (e) => {
      const excerptEl = e.target.classList.contains('excerpt') ? e.target : e.target.closest('.excerpt');
      if (excerptEl) {
        document.querySelector('.excerpt.current')?.classList.remove('current');
        excerptEl.classList.add('current');
        console.log('front: excerpt element clicked, ' + excerptEl.dataset.index);
        displayFullFragment(parseInt(excerptEl.dataset.index));
        previewsEl.scrollTo({
          left: fullPreviewOuter.offsetLeft,
          behavior: 'smooth'
        });
      }
    });

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function findAllOccurrencesWithPositions(text, searchString) {
      const regex = new RegExp(escapeRegExp(searchString), 'g');
      let match;
      const results = [];

      while ((match = regex.exec(text)) !== null) {
        results.push(match.index);
        // Для избежания бесконечного цикла при нулевой длине совпадения
        if (match.index === regex.lastIndex) {
          regex.lastIndex++;
        }
      }

      return results;
    }

    window.onIndexProgress = function (fileName, percent) {
      console.log('front: onIndexProgress ' + percent);
      document.getElementById('fileName').textContent = "Файл: " + fileName;
      document.getElementById('progressBar').value = percent;
    }

    function onIndexDone(data) {
      renderIndexedFolders(data);
      indexPregressContainer.classList.add('hidden');
    }

    function renderIndexedFolders(data) {
      let allFoldersRes = '';
      if (looksLikeJSON(data)) {
        allFoldersRes = JSON.parse(data).map(o => {
          return `
          <li><input type="checkbox" name="indexFolder" value="${o.id}">&nbsp;${o.path}</li>
        `
        }).join('');
      } else {
        allFoldersRes = data;
      }
      indexResultEl.innerHTML = `
      <h5>Indexed folders</h5>
      <ul id="indexedFoldersList">
        ${allFoldersRes}
      </ul>
    `;
    }

    renderIndexedFolders(Android.getIndexedFolders());
  </script>
</body>
